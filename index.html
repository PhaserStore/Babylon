<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Virtual Gallery — Clean View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root{
      --txt:#fff; --txt-dim:#ccc;
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --bar-h: 54px;
      --btn-bg:#2b2b2b;
      --btn-bg-hover:#3a3a3a;
      --btn-brd:rgba(255,255,255,.15);
      --accent:#ff6a00;
    }
    html,body{
      width:100%; height:100%; margin:0; overflow:hidden; background:#111; color:var(--txt);
      font-family:'Poppins',sans-serif;
    }
    #renderCanvas{
      position:fixed; inset:0; display:block; touch-action:none; width:100vw; height:100vh;
      /* FIX 1: explicit compositing layer — prevents browser from re-compositing the canvas
         every frame alongside DOM elements, which was causing the flicker seam at the
         canvas/HUD boundary. */
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    #scBar{
      position:fixed; left:0; right:0; bottom:0;
      height:var(--bar-h); background:#1a1a1a;
      border-top:1px solid rgba(255,255,255,.15);
      display:flex; align-items:center; padding:0 14px; gap:20px;
      z-index:50; font-size:13px; color:#eee;
      -webkit-tap-highlight-color: transparent;
      /* FIX 2: promote bar to its own layer so it never triggers canvas repaints */
      will-change: transform;
      transform: translateZ(0);
    }
    #scBar button{
      width:34px; height:34px; border-radius:8px; border:1px solid var(--btn-brd);
      background:var(--btn-bg); color:#fff; cursor:pointer; display:inline-grid; place-items:center; outline:none;
    }
    #scBar button:hover{ background:var(--btn-bg-hover); }
    #scBar button:focus-visible{ box-shadow: 0 0 0 2px rgba(255,255,255,.25); }
    .icon{ width:18px; height:18px; display:block; fill:#fff; pointer-events:none; }
    .sc-left{ display:flex; gap:6px; align-items:center; }
    .sc-center{ flex:1; display:flex; align-items:center; gap:10px; user-select:none; min-width:180px; }
    #scSeek{ flex:1; height:6px; background:#555; border-radius:4px; position:relative; cursor:pointer; }
    #scSeekFill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); border-radius:4px; }
    .time{ min-width:40px; text-align:center; color:#ddd; font-variant-numeric: tabular-nums; }
    .sc-right{ display:flex; align-items:center; gap:12px; min-width:280px; }
    #scThumb{ width:34px; height:34px; border-radius:6px; object-fit:cover; }
    #barVol{ width:84px; }

    .hudIcon{
      position:fixed; z-index:10000; width:56px; height:56px; cursor:pointer; user-select:none; -webkit-user-drag:none;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45)); opacity:.96; transition: transform .12s ease, opacity .12s ease;
      right:calc(12px + var(--safe-right)); bottom:calc(12px + var(--bar-h) + var(--safe-bottom));
      /* FIX 3: own layer for every HUD icon so hover transitions don't invalidate canvas */
      will-change: transform, opacity;
    }
    .hudIcon:hover{ transform:translateY(-1px); opacity:1; }
    #fullscreenIcon{ right:calc(12px + var(--safe-right) + 56px + 8px); }

    .hudIconLeft{
      position:fixed; z-index:10000; width:56px; height:56px; cursor:pointer; user-select:none; -webkit-user-drag:none;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45)); opacity:.96; transition: transform .12s ease, opacity .12s ease;
      left:calc(12px + var(--safe-left)); bottom:calc(12px + var(--bar-h) + var(--safe-bottom));
      will-change: transform, opacity;
    }
    .hudIconLeft:hover{ transform:translateY(-1px); opacity:1; }
    #shareIcon{ left:calc(12px + var(--safe-left) + 56px + 8px); }

    @media (max-width: 560px){
      #scBar{ gap:12px; padding:0 10px; }
      .sc-right{ min-width:200px; gap:10px; }
      #barVol{ width:70px; }
      .time{ display:none; }
    }

    @media (pointer:coarse), (max-width: 900px){
      :root{
        --icon-size: 56px;
        --mobile-shift: var(--icon-size);
      }
      .hudIcon{
        bottom: max(6px, calc(12px + var(--safe-bottom) - var(--mobile-shift)));
      }
      .hudIconLeft{
        bottom: max(6px, calc(12px + var(--safe-bottom) - var(--mobile-shift)));
      }
      #fullscreenIcon{ display:none !important; }
      #scBar, #scIframeHost{ display:none !important; }
      #instaIcon, #shareIcon{ display:block !important; }
      #shareIcon{
        left: calc(12px + var(--safe-left) + 56px + 8px);
      }
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>

<body>
  <canvas id="renderCanvas"></canvas>

  <img id="fullscreenIcon" class="hudIcon"
    src="https://raw.githubusercontent.com/PhaserStore/Babylon/main/assets/full%20screen.svg"
    alt="Celá obrazovka" title="Přepnout celé okno"
    role="button" tabindex="0" aria-label="Celá obrazovka" aria-pressed="false" />
  <img id="resetCamIcon" class="hudIcon"
    src="./assets/focus.svg" alt="Reset kamery" title="Reset kamery (R)"
    role="button" tabindex="0" aria-label="Reset kamery" />
  <img id="instaIcon" class="hudIconLeft"
    src="./assets/Insta.svg" alt="Instagram" title="Open Instagram @__phaser__"
    role="button" tabindex="0" aria-label="Open Instagram profile" />
  <img id="shareIcon" class="hudIconLeft"
    src="./assets/Share.svg" alt="Share" title="Share this page"
    role="button" tabindex="0" aria-label="Sdílet odkaz na tuto stránku" />

  <div id="scBar" aria-label="SoundCloud Bar">
    <div class="sc-left">
      <button id="barPrev" title="Previous" aria-label="Previous">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M11 6v12l-8-6 8-6zm10 0v12l-8-6 8-6z"/></svg>
      </button>
      <button id="barPlay" title="Play" aria-label="Play">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button id="barPause" title="Pause" aria-label="Pause">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
      </button>
      <button id="barNext" title="Next" aria-label="Next">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M13 6v12l8-6-8-6zM3 6v12l8-6-8-6z"/></svg>
      </button>
    </div>
    <div class="sc-center">
      <span id="scTimeCur" class="time">0:00</span>
      <div id="scSeek" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
        <div id="scSeekFill"></div>
      </div>
      <span id="scTimeDur" class="time">0:00</span>
    </div>
    <div class="sc-right">
      <button id="barMute" title="Mute/Unmute" aria-label="Mute or unmute">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 5V4L8 9H4z"/></svg>
      </button>
      <input id="barVol" type="range" min="0" max="100" value="75" aria-label="Volume" />
      <img id="scThumb" src="" alt="cover" />
      <span id="scTitle">–</span>
    </div>
  </div>

  <div id="scIframeHost" style="position:fixed; left:-99999px; top:-99999px; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none;"></div>

  <script>
  "use strict";

  /* ========= Helpers & flags ========= */
  const IS_MOBILE =
    /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
    Math.min(window.innerWidth, window.innerHeight) <= 900 ||
    window.matchMedia?.('(pointer:coarse)').matches === true;

  const IS_IOS = /iP(ad|hone|od)/.test(navigator.userAgent);
  const SC_ENABLED = !IS_MOBILE;

  const fmtTime = (ms)=> {
    const sec = Math.max(0, Math.floor((ms||0)/1000));
    const m = Math.floor(sec/60), s = sec%60;
    return `${m}:${s.toString().padStart(2,'0')}`;
  };

  const DPR = (()=> {
    const raw = window.devicePixelRatio || 1;
    const steps = [1, 1.25, 1.5, 2, 2.5, 3];
    let pick = steps[0], best = Infinity;
    for (const s of steps){ const d = Math.abs(s - raw); if (d < best){ best = d; pick = s; } }
    return pick;
  })();

  const canvas = document.getElementById("renderCanvas");

  const engine = new BABYLON.Engine(canvas, true, {
    preserveDrawingBuffer: false,
    stencil: true,
    antialias: true,
    adaptToDeviceRatio: false,
    powerPreference: "high-performance",
    disableWebGL2Support: false
  });

  const sceneCaps = engine.getCaps ? engine.getCaps() : {};
  const MAX_TEX_CAP = Math.max(512, sceneCaps.maxTextureSize || 2048);
  const MOBILE_TEX_CAP  = Math.min(MAX_TEX_CAP, 768);
  const DESKTOP_TEX_CAP = Math.min(MAX_TEX_CAP, 4096);
  const TEX_BASE = IS_MOBILE ? 1048 : 768;
  const nearestPOT = (n, cap)=> Math.min(Math.pow(2, Math.round(Math.log2(Math.max(2, n)))), cap || n);
  let TEX_SIZE = Math.round(TEX_BASE * Math.min(DPR, 2));
  TEX_SIZE = nearestPOT(Math.min(TEX_SIZE, IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP), IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP);
  const MAX_ANISO = sceneCaps.maxAnisotropy || 4;

  /* ===== Typewriter config ===== */
  const TW_STRINGS = {
    front: [
      "WELCOME_TO_THE_VIRTUAL_SHOWROOM",
      "EXPLORE_THE_COLLECTIONS",
      "FOLLOW_US_ON_INSTAGRAM"
    ],
    back: [
      "THANK_YOU_FOR_VISITING",
      "NEW_DROPS_THIS_MONTH",
      "LIMITED_EDITION_OUT_NOW"
    ],
    left: [
      "CLICK_LABELS_TO_OPEN_LINKS",
      "SUSTAINABLE_MATERIALS",
      "SHIPPED_WORLDWIDE"
    ],
    right: [
      "CONTEMPORARY_DESIGN",
      "LIMITED_EDITION",
      "CUSTOM_REQUESTS"
    ]
  };

  const TW_SPEED_MS     = 75;
  const TW_PAUSE_MS     = 1900;
  const TW_COLOR_HEX    = "#daff3e";
  const TW_FONT_PX      = 175;
  const TW_MARGIN_WALL  = 0.18;
  const TW_FLIP_VERTICAL = true;
  const TW_OFFSET_PX = -190;
  const TW_CURSOR_BLINK_MS   = 450;
  const TW_CURSOR_ALPHA_MIN  = 0.25;
  const TW_CURSOR_ALPHA_MAX  = 1.00;
  const TW_CURSOR_COLOR      = TW_COLOR_HEX;

  let __twFrontPlane = null, __twBackPlane = null;
  let __twFrontDT = null, __twBackDT = null;
  let __twFrontRAF = 0, __twBackRAF = 0;
  let twFrontAnchor = null;
  let twBackAnchor  = null;

  function projectToScreen(worldPos){
    const eng   = scene.getEngine();
    const vp    = camera.viewport.toGlobal(eng.getRenderWidth(), eng.getRenderHeight());
    const p = BABYLON.Vector3.Project(
      worldPos,
      BABYLON.Matrix.Identity(),
      scene.getTransformMatrix(),
      vp
    );
    const rect = eng.getRenderingCanvasClientRect
      ? eng.getRenderingCanvasClientRect()
      : (eng.getRenderingCanvas() || canvas).getBoundingClientRect();
    const sx = rect.width  / eng.getRenderWidth();
    const sy = rect.height / eng.getRenderHeight();
    const cssX = rect.left + p.x * sx;
    const cssY = rect.top  + p.y * sy;
    const visible = p.z >= 0 && p.z <= 1
                 && p.x >= 0 && p.x <= eng.getRenderWidth()
                 && p.y >= 0 && p.y <= eng.getRenderHeight();
    return { x: p.x, y: p.y, cssX, cssY, visible };
  }

  function prepareTypewriterSlots(el){
    if (!el) return null;
    if (el.dataset.twInit) return el.querySelector('.tw-text');
    const textSpan   = document.createElement('span');
    const cursorSpan = document.createElement('span');
    textSpan.className   = 'tw-text';
    cursorSpan.className = 'cursor';
    el.innerHTML = '';
    el.appendChild(textSpan);
    el.appendChild(cursorSpan);
    el.dataset.twInit = '1';
    return textSpan;
  }

  function makeTypewriterPlane({ name, x = 0, y, z, rotY, width, height, color=TW_COLOR_HEX }){
    const plane = BABYLON.MeshBuilder.CreatePlane(name, { width, height, sideOrientation: BABYLON.Mesh.FRONTSIDE }, scene);
    plane.position.set(x, y, z);
    plane.rotation.y = rotY;
    plane.isPickable = false;

    const nextPOT = (n) => Math.pow(2, Math.ceil(Math.log2(Math.max(1, n))));
    const texW = Math.max(1024, nextPOT(Math.round(1024 * (width / 4))));
    const texH = Math.max(256, nextPOT(Math.round(TW_FONT_PX * 2)));

    const dt = new BABYLON.DynamicTexture(name + "_dt", { width: texW, height: texH }, scene, true, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    dt.hasAlpha = true;
    dt.gammaSpace = true;
    dt.wrapU = dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.anisotropicFilteringLevel = scene.getEngine().getCaps().maxAnisotropy || 4;

    const mat = new BABYLON.StandardMaterial(name + "_mat", scene);
    mat.disableLighting = true;
    mat.backFaceCulling = false;
    mat.diffuseTexture = dt;
    mat.opacityTexture = dt;
    mat.emissiveTexture = dt;
    mat.emissiveColor = BABYLON.Color3.FromHexString(TW_COLOR_HEX);

    plane.material = mat;

    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);
    dt.update(false); // FIX 4: false = skip mipmap regen on init clear

    return { plane, dt, texW, texH };
  }

  /* ─────────────────────────────────────────────────────────────────
   * FIX 5 — drawTypeLine: changed dt.update(false) everywhere.
   *
   * Original code called dt.update() (no arg) which defaults to
   * invertY=true AND triggers a full mipmap regeneration chain on
   * every single animation frame.  With TW_SPEED_MS=75ms that means
   * ~13 full GPU mipmap rebuilds per second PER typewriter plane —
   * two planes = 26 per second.  Each rebuild stalls the GPU pipeline
   * for a few ms, showing as periodic white/black flicker on slower
   * GPUs and Safari (which serialises GPU work more aggressively).
   *
   * Passing false disables the per-call mipmap regen; mipmaps are
   * generated once by Babylon at first bind and stay valid because
   * the texture size never changes.
   * ───────────────────────────────────────────────────────────────── */
  function drawTypeLine(dt, {
    text,
    progress,
    texW,
    texH,
    color = TW_COLOR_HEX,
    fontPx = TW_FONT_PX
  }){
    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);

    ctx.imageSmoothingEnabled  = true;
    ctx.imageSmoothingQuality  = "high";
    ctx.fillStyle              = color;
    ctx.textAlign              = "center";
    ctx.textBaseline           = "middle";
    ctx.font                   = `600 ${fontPx}px Doto, monospace`;

    const x = Math.round(texW / 2);
    const y = Math.round(texH / 2) + (TW_OFFSET_PX | 0);
    const content = text.slice(0, progress);

    ctx.save();
    if (TW_FLIP_VERTICAL){
      ctx.translate(0, texH);
      ctx.scale(1, -1);
    }

    ctx.shadowColor = "rgba(218,255,62,0.20)";
    ctx.shadowBlur  = Math.max(2, Math.round(fontPx * 0.22));

    ctx.fillText(content, x, y);

    if (progress > 0){
      const metrics   = ctx.measureText(content);
      const textWidth = metrics?.width || 0;
      const endX      = x + textWidth / 2;

      const now     = performance.now();
      const period  = Math.max(120, TW_CURSOR_BLINK_MS || 900);
      const tRel    = (now % period) / period;
      const tri     = tRel < 0.5 ? (tRel * 2) : (1 - (tRel - 0.5) * 2);
      const alpha   = (TW_CURSOR_ALPHA_MIN ?? 0.25) + tri * ((TW_CURSOR_ALPHA_MAX ?? 1.0) - (TW_CURSOR_ALPHA_MIN ?? 0.25));

      const prevShadow = ctx.shadowColor;
      const prevAlpha  = ctx.globalAlpha;
      const prevFill   = ctx.fillStyle;
      const prevAlign  = ctx.textAlign;

      ctx.shadowColor  = "rgba(0,0,0,0)";
      ctx.globalAlpha  = Math.max(0, Math.min(1, alpha));
      ctx.fillStyle    = TW_CURSOR_COLOR || color;
      ctx.textAlign    = "left";
      ctx.fillText("_", Math.round(endX + 2), y);

      ctx.textAlign   = prevAlign;
      ctx.fillStyle   = prevFill;
      ctx.globalAlpha = prevAlpha;
      ctx.shadowColor = prevShadow;
    }

    ctx.restore();
    dt.update(false); // ← KEY FIX: no mipmap regen every frame
  }

  function runTypewriterToDT(dt, opts = {}){
    const {
      texts: _texts,
      text: _text,
      speedMs = TW_SPEED_MS,
      pauseMs = TW_PAUSE_MS,
      texW,
      texH,
      color = TW_COLOR_HEX,
      fontPx = TW_FONT_PX
    } = opts;

    const texts = Array.isArray(_texts) && _texts.length ? _texts : [(_text || "")];
    if (!texts.length) return 0;

    let idx = 0;
    let start = performance.now();
    let rafId = 0;

    /* ─────────────────────────────────────────────────────────────
     * FIX 6 — throttled typewriter updates.
     *
     * Original: called drawTypeLine on every rAF (~60/s), uploading
     * a new texture every frame even when no character had changed
     * (during the pause phase).  This caused constant GPU texture
     * uploads that manifested as subtle flickering, especially during
     * the pause phase when the cursor blink is the only change.
     *
     * Fix: track the last rendered (charCount, cursorAlphaBucket)
     * and skip the draw + upload entirely when nothing has visually
     * changed.  Cursor blink is bucketed to ~20 levels so we still
     * get smooth breathing without uploading 60× per second.
     * ───────────────────────────────────────────────────────────── */
    let lastChars = -1;
    let lastCursorBucket = -1;

    function tick(now){
      const t = texts[idx];
      const lenMs = t.length * speedMs;
      const elapsed = now - start;

      let chars;
      if (elapsed <= lenMs) {
        chars = Math.floor(elapsed / speedMs);
      } else {
        chars = t.length;
        if (elapsed >= lenMs + pauseMs) {
          idx = (idx + 1) % texts.length;
          start = now;
          lastChars = -1; // force redraw on text switch
          lastCursorBucket = -1;
        }
      }

      // Cursor blink bucket (20 steps = ~50ms granularity at 450ms period)
      const period = Math.max(120, TW_CURSOR_BLINK_MS);
      const cursorBucket = Math.floor(((now % period) / period) * 20);

      // Skip upload if nothing changed
      if (chars !== lastChars || cursorBucket !== lastCursorBucket) {
        drawTypeLine(dt, { text: t, progress: chars, texW, texH, color, fontPx });
        lastChars = chars;
        lastCursorBucket = cursorBucket;
      }

      rafId = requestAnimationFrame(tick);
    }

    return (rafId = requestAnimationFrame(tick));
  }

  /* ========= Scene setup ========= */
  let scene, camera, glow;
  const ROOM = { W:16, D:30, H:13 };
  const MIN_RADIUS = 0.28;

  const BASE_LEVEL = Math.max(0.33, Math.min(1 / DPR, 1));
  let currentScaleLevel = Math.round(BASE_LEVEL * 100) / 100;
  function applyHardwareScale(levelOverride){
    const lvl = typeof levelOverride === "number" ? levelOverride : currentScaleLevel;
    engine.setHardwareScalingLevel(Math.round(lvl * 100) / 100);
  }
  applyHardwareScale();

  const AutoScale = {
    enabled: IS_MOBILE, windowMs: 1200, warmupMs: 1500, lowFpsMs: 30, highFpsMs: 17,
    step: 0.05, minLevel: 0.33, maxLevel: 1.00, accMs: 0, frames: 0, lastEval: performance.now()
  };

  function unlit(hex){
    const m = new BABYLON.StandardMaterial("m", scene);
    m.diffuseColor = BABYLON.Color3.FromHexString(hex);
    m.disableLighting = true;
    m.backFaceCulling = false;
    m.specularColor = new BABYLON.Color3(0,0,0);
    return m;
  }

  function unlitTex(tex, { doubleSided = false, gain = 1.18 } = {}) {
    const m = new BABYLON.StandardMaterial("mt", scene);
    m.disableLighting = true;
    m.diffuseTexture  = tex;
    m.emissiveTexture = tex;
    m.emissiveColor   = new BABYLON.Color3(1, 1, 1);
    m.backFaceCulling = !doubleSided;
    m.specularColor   = new BABYLON.Color3(0, 0, 0);
    if (tex) {
      tex.gammaSpace = true;
      tex.level      = gain;
      tex.wrapU = tex.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
      tex.updateSamplingMode(BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
      tex.anisotropicFilteringLevel = MAX_ANISO;
    }
    return m;
  }

  function makeDT(name, w, h, genMipmaps=true) {
    const dt = new BABYLON.DynamicTexture(
      name,
      { width: w, height: h },
      scene,
      genMipmaps,
      BABYLON.Texture.TRILINEAR_SAMPLINGMODE
    );
    dt.wrapU = dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.hasAlpha = false;
    dt.anisotropicFilteringLevel = MAX_ANISO;
    return dt;
  }

  async function svgToInkOverlayTexture(svgUrl, {
    maxSize = 2048,
    targetAspect = 1.0,
    ink = { r: 255, g: 255, b: 255 },
    alphaGain = 1.8,
    alphaMax = 1.0,
    sampling = BABYLON.Texture.TRILINEAR_SAMPLINGMODE,
    mode = "auto",
    binaryAlpha = false,
    threshold = 0.10
  } = {}) {
    const nextPOT = (n) => Math.pow(2, Math.ceil(Math.log2(Math.max(2, n))));
    const cap = IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP;

    const res = await fetch(svgUrl, { cache: "no-cache" });
    if (!res.ok) throw new Error(`SVG fetch failed: ${res.status} ${res.statusText}`);
    const svgText = await res.text();

    const blob = new Blob([svgText], { type: "image/svg+xml" });
    const blobUrl = URL.createObjectURL(blob);

    const img = await new Promise((resolve, reject) => {
      const im = new Image();
      im.decoding = "async";
      im.onload = () => resolve(im);
      im.onerror = reject;
      im.src = blobUrl;
    });

    let w = Math.min(cap, maxSize);
    let h = Math.round(w / Math.max(1e-6, targetAspect));
    if (h > cap) { h = cap; w = Math.round(h * targetAspect); }
    w = Math.min(nextPOT(w), cap);
    h = Math.min(nextPOT(h), cap);

    const tmp = document.createElement("canvas");
    tmp.width = w; tmp.height = h;
    const tctx = tmp.getContext("2d", { willReadFrequently: true });
    tctx.clearRect(0, 0, w, h);
    tctx.imageSmoothingEnabled = true;
    tctx.imageSmoothingQuality = "high";
    tctx.drawImage(img, 0, 0, w, h);
    const imgData = tctx.getImageData(0, 0, w, h);
    const d = imgData.data;

    let sumLum = 0, count = 0;
    for (let i = 0; i < d.length; i += 4) {
      const a = d[i + 3];
      if (a > 10) {
        const r = d[i], g = d[i + 1], b = d[i + 2];
        sumLum += (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        count++;
      }
    }
    const avgLum = count ? (sumLum / count) : 0;
    let useWhiteAsInk;
    if (mode === "whiteOnTransparent") useWhiteAsInk = true;
    else if (mode === "blackOnTransparent") useWhiteAsInk = false;
    else useWhiteAsInk = avgLum > 0.55;

    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i + 1], b = d[i + 2];
      const a = d[i + 3] / 255;
      const lum = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
      let cov = useWhiteAsInk ? (lum * a) : ((1 - lum) * a);
      cov = Math.max(0, Math.min(1, cov * alphaGain));
      if (binaryAlpha) cov = (cov >= threshold) ? 1 : 0;
      d[i]     = ink.r;
      d[i + 1] = ink.g;
      d[i + 2] = ink.b;
      d[i + 3] = Math.round(cov * alphaMax * 255);
    }

    const out = new BABYLON.DynamicTexture("floorInkDT", { width: w, height: h }, scene, true, sampling);
    out.hasAlpha = true;
    out.gammaSpace = true;
    const ctx = out.getContext();
    ctx.putImageData(imgData, 0, 0);
    out.update(false); // FIX 4 applied here too
    out.wrapU = BABYLON.Texture.CLAMP_ADDRESSMODE;
    out.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    out.uScale = 1; out.vScale = 1;
    out.anisotropicFilteringLevel = MAX_ANISO || 4;
    URL.revokeObjectURL(blobUrl);
    return out;
  }

  function buildLED() {
    const n = new BABYLON.TransformNode("led", scene);
    const t = 0.02, inw = 0.1;
    const xL = -ROOM.W/2 + inw, xR = ROOM.W/2 - inw, zF = ROOM.D/2 - inw, zB = -ROOM.D/2 + inw;
    const y0 = 0.04, y1 = ROOM.H - 0.04;

    mat.emissiveColor = BABYLON.Color3.FromHexString("#ffbdf6");
    mat.disableLighting = true;
    const seg = (a, b) => {
      const d = BABYLON.Vector3.Distance(a, b);
      const m = BABYLON.MeshBuilder.CreateBox("ledSeg", { width: t, height: t, depth: d }, scene);
      m.position = BABYLON.Vector3.Center(a, b); m.lookAt(b); m.rotation.x += Math.PI;
      m.material = mat; m.isPickable = false; m.parent = n; glow.addIncludedOnlyMesh(m);
    };
    [[xL,y0,zF,xR,y0,zF],[xR,y0,zF,xR,y0,zB],[xR,y0,zB,xL,y0,zB],[xL,y0,zB,xL,y0,zF],
     [xL,y1,zF,xR,y1,zF],[xR,y1,zF,xR,y1,zB],[xR,y1,zB,xL,y1,zB],[xL,y1,zB,xL,y1,zF]]
     .forEach(([ax,ay,az,bx,by,bz]) => seg(new BABYLON.Vector3(ax,ay,az), new BABYLON.Vector3(bx,by,bz)));
    [[xL,zF],[xR,zF],[xR,zB],[xL,zB]].forEach(([x,z]) => seg(new BABYLON.Vector3(x,y0,z), new BABYLON.Vector3(x,y1,z)));
  }

  function drawChecker(ctx, w, h) {
    const tile = 32;
    for (let y=0; y<h; y+=tile) for (let x=0; x<w; x+=tile){
      const even = ((x/tile)+(y/tile)) % 2 === 0;
      ctx.fillStyle = even ? "#dcdcdc" : "#f4f4f4";
      ctx.fillRect(x, y, tile, tile);
    }
  }

  function fitDrawToCanvas(ctx, bmp, targetW, targetH, frameW, frameH, mode="cover", bg="#000") {
    const frameAspect = frameW / frameH;
    const imgAspect   = bmp.width / bmp.height;
    const nearlySame = Math.abs(imgAspect - frameAspect) < 0.02;
    let dw, dh, dx = 0, dy = 0;
    if (mode === "contain" && nearlySame) {
      dw = targetW; dh = targetH; dx = 0; dy = 0;
    } else if (mode === "cover"){
      if (imgAspect > frameAspect){
        dh = targetH; dw = Math.round(dh * imgAspect); dx = Math.round((targetW - dw) / 2);
      } else {
        dw = targetW; dh = Math.round(dw / imgAspect); dy = Math.round((targetH - dh) / 2);
      }
    } else {
      if (imgAspect > frameAspect){
        dw = targetW; dh = Math.round(dw / imgAspect); dy = Math.round((targetH - dh) / 2);
      } else {
        dh = targetH; dw = Math.round(dh * imgAspect); dx = Math.round((targetW - dw) / 2);
      }
    }
    if (bg){ ctx.fillStyle = bg; ctx.fillRect(0, 0, targetW, targetH); }
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(bmp, 0, 0, bmp.width, bmp.height, dx, dy, dw, dh);
  }

  const isWebP = (u) => /\.webp$/i.test(u || "");

  function getFrameTexSize() {
    const A = FRAME_SIZE.W / FRAME_SIZE.H;
    const cap = IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP;
    let texW = Math.min(TEX_SIZE, cap);
    texW = nearestPOT(texW, cap);
    let texH = Math.round(texW / A);
    texH = nearestPOT(Math.max(2, texH), cap);
    if (texH > cap) {
      texH = nearestPOT(cap, cap);
      texW = nearestPOT(Math.max(2, Math.round(texH * A)), cap);
    }
    return { texW, texH };
  }

  /* ─────────────────────────────────────────────────────────────────
   * FIX 7 — setWebPToFrame: atomic material swap, no mid-frame flicker.
   *
   * Original: new DynamicTexture + new material created inside
   * img.onload, then immediately assigned to frame.material.  When
   * Babylon picks this up mid-frame the old texture is already
   * released from the GPU before the new one is ready, causing a
   * 1–3 frame transparent/black flash (very visible as a flicker).
   *
   * Fix: build the DT + material completely offscreen, then defer
   * the swap to the next scene.onBeforeRenderObservable tick so the
   * assignment always happens at a deterministic point in the render
   * pipeline (before draw calls, after all JS for that frame).
   * The old material is disposed only AFTER the new one is bound.
   * ───────────────────────────────────────────────────────────────── */
  function setWebPToFrame(url, targetItem, texSize=TEX_SIZE, fitMode="cover") {
    if (!isWebP(url)) {
      console.warn("Pouze WebP je povolen pro rámové obrazy. Přeskakuji:", url);
      return;
    }
    const safeUrl = encodeURI(url);
    const img = new Image();
    if (!/^(\.|\/)/.test(safeUrl)) img.crossOrigin = "anonymous";
    img.decoding = "async";

    img.onload = () => {
      const { texW, texH } = getFrameTexSize();
      const dt = makeDT("imgDT_" + Math.random(), texW, texH, !IS_MOBILE);
      dt.gammaSpace = true;
      const ctx = dt.getContext();
      fitDrawToCanvas(ctx, img, texW, texH, FRAME_SIZE.W, FRAME_SIZE.H, fitMode, "#000");
      dt.update(false); // FIX 4

      const newMat = unlitTex(dt);
      newMat.zOffset = -1;
      // FIX (image flip): the frame plane is rotated rotY + Math.PI, which renders
      // the image texture upside-down. Mirror the V axis so it reads right-side-up.
      dt.vScale  = -1;
      dt.vOffset = 1;

      // Defer swap to next render-loop tick to avoid mid-frame GPU state change
      const swapObserver = scene.onBeforeRenderObservable.addOnce(() => {
        const oldMat = targetItem.frame.material;
        targetItem.frame.material = newMat;
        // Dispose old material + its texture on the tick AFTER swap
        // so the GPU has time to bind the new one
        scene.onBeforeRenderObservable.addOnce(() => {
          if (oldMat && oldMat.name !== "ph_img_mat") {
            oldMat.diffuseTexture?.dispose();
            oldMat.emissiveTexture?.dispose();
            oldMat.dispose();
          }
        });
      });
    };

    img.onerror = (e) => console.error("[WebP] Chyba načítání:", safeUrl, e);
    img.src = safeUrl;
  }

  function setVideoToFrame(url, targetItem, { loop=true, muted=true, autoplay=true } = {}) {
    const vt = new BABYLON.VideoTexture(
      "vidTex_" + Math.random(), url, scene, true, false,
      BABYLON.Texture.TRILINEAR_SAMPLINGMODE,
      { autoPlay: autoplay, loop: loop, muted: muted }
    );
    try {
      vt.video.muted = !!muted;
      vt.video.loop = !!loop;
      vt.video.playsInline = true;
    } catch (e) {}
    vt.wrapU = vt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    vt.updateSamplingMode(BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    vt.anisotropicFilteringLevel = MAX_ANISO;

    const mat = unlitTex(vt);
    mat.zOffset = -1;
    mat.diffuseColor = new BABYLON.Color3(0,0,0);
    targetItem.frame.material = mat;
    targetItem.videoTex = vt;

    const applyAspect = () => {
      const v = vt.video;
      if (!v || !v.videoWidth || !v.videoHeight) return;
      const r = v.videoWidth / v.videoHeight;
      const A = FRAME_SIZE.W / FRAME_SIZE.H;
      let uScale = 1, vScale = 1, uOffset = 0, vOffset = 0;
      if (r > A) { vScale = A / r; vOffset = (1 - vScale) / 2; }
      else if (r < A) { uScale = r / A; uOffset = (1 - uScale) / 2; }
      vt.uScale = uScale; vt.vScale = vScale;
      vt.uOffset = uOffset; vt.vOffset = vOffset;
    };
    if (vt.video) {
      vt.video.addEventListener('loadedmetadata', applyAspect, { once:true });
      applyAspect();
    }
  }

  const FRAME_SIZE = { W: 2, H: 2 };
  let FRAME_BOX_BORDER = 0.08;
  let FRAME_COLOR = "#717171";
  let FRAME_BASE_H = 2.2;
  let FRAME_DELTA_H = 0;

  function makeGradDT(name, w, h, {from="#7a7a7a", to="#555", vertical=true}={}){
    const dt = new BABYLON.DynamicTexture(name, {width:w, height:h}, scene, true, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    const ctx = dt.getContext();
    ctx.clearRect(0,0,w,h);
    const g = vertical ? ctx.createLinearGradient(0,0,0,h) : ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0, from); g.addColorStop(1, to);
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    dt.update(false); // FIX 4
    dt.wrapU = dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.anisotropicFilteringLevel = MAX_ANISO;
    return dt;
  }

  const lighten = (c,f)=> new BABYLON.Color3(Math.min(1, c.r+(1-c.r)*f), Math.min(1, c.g+(1-c.g)*f), Math.min(1, c.b+(1-c.b)*f));
  const darken  = (c,f)=> new BABYLON.Color3(c.r*(1-f), c.g*(1-f), c.b*(1-f));

  function makeShadedFrameBoxMultiMat(baseHex = FRAME_COLOR){
    const c = BABYLON.Color3.FromHexString(baseHex);
    const mats = [
      makeGradDT("frm_front",256,256,{from:lighten(c,0.12).toHexString(), to:darken(c,0.18).toHexString()}),
      makeGradDT("frm_back",256,256,{from:darken(c,0.10).toHexString(), to:darken(c,0.10).toHexString()}),
      makeGradDT("frm_right",256,256,{from:lighten(c,0.08).toHexString(), to:darken(c,0.12).toHexString()}),
      makeGradDT("frm_left",256,256,{from:lighten(c,0.08).toHexString(), to:darken(c,0.12).toHexString()}),
      makeGradDT("frm_top",256,256,{from:lighten(c,0.20).toHexString(), to:lighten(c,0.20).toHexString()}),
      makeGradDT("frm_bottom",256,256,{from:darken(c,0.25).toHexString(), to:darken(c,0.25).toHexString()}),
    ].map((dt,i)=>{
      const m = new BABYLON.StandardMaterial("frmMat_"+i, scene);
      m.disableLighting = true;
      m.diffuseTexture = dt;
      m.emissiveTexture = dt;
      m.backFaceCulling = false;
      m.specularColor = new BABYLON.Color3(0,0,0);
      return m;
    });
    const mm = new BABYLON.MultiMaterial("frameBoxMM", scene);
    mats.forEach(m => mm.subMaterials.push(m));
    return mm;
  }

  function drawPlacard(plac, data, rotY, planeW, planeH){
    const texWFull = TEX_SIZE;
    const texWTarget = IS_MOBILE ? Math.max(256, Math.min(1024, Math.round(texWFull * 0.5))) : texWFull;
    const texW = nearestPOT(texWTarget, IS_MOBILE ? 1024 : 2048);
    const texH = nearestPOT(Math.max(64, Math.round(texW * (planeH / planeW))), texW);
    const dt = makeDT("pl", texW, texH, !IS_MOBILE);
    const c = dt.getContext();
    c.fillStyle = "#6b6b6b"; c.fillRect(0,0,texW,texH);
    const pad = Math.round(texH * 0.12);
    const maxW = texW - pad*2;
    c.fillStyle = "#ffffff"; c.textAlign = "center"; c.textBaseline = "top";
    const lineH = Math.round(texH * 0.34);
    const fontSize = Math.max(18, Math.round(lineH * 0.78));
    c.font = `600 ${fontSize}px Poppins`;
    const text = (data.title || "(bez názvu)").trim();
    const words = text.split(/\s+/);
    const lines = []; let buf = "";
    for (let w of words){
      const test = buf ? (buf + " " + w) : w;
      if (c.measureText(test).width <= maxW) buf = test;
      else { if (buf) lines.push(buf); buf = w; }
    }
    if (buf) lines.push(buf);
    const maxLines = 2;
    if (lines.length > maxLines){
      const keep = lines.slice(0, maxLines);
      let last = keep[maxLines-1];
      while (c.measureText(last + "…").width > maxW && last.length>0) last = last.slice(0,-1);
      keep[maxLines-1] = last + "…";
      lines.length = 0; Array.prototype.push.apply(lines, keep);
    }
    const blockH = lines.length * lineH;
    const startY = Math.max(pad, Math.round((texH - blockH)/2));
    lines.forEach((ln, i)=> c.fillText(ln, texW / 2, startY + i*lineH + Math.round(lineH*0.1)));
    dt.update(false); // FIX 4
    const mat = unlitTex(dt); mat.zOffset = -2;
    // FIX (placard flip): placard plane is rotated rotY + Math.PI, rendering the
    // text upside-down AND mirrored. Mirror both U and V so the label reads normally.
    dt.uScale = -1; dt.uOffset = 1;
    dt.vScale = -1; dt.vOffset = 1;
    plac.material = mat;
  }

  function normalOffset(rotY, dist){
    const nx = Math.sin(rotY) * dist;
    const nz = Math.cos(rotY) * dist;
    return new BABYLON.Vector3(nx, 0, nz);
  }

  function addFrame(pos, rotY=0, wall='front'){
    const box = BABYLON.MeshBuilder.CreateBox("frameBox", {
      width: FRAME_SIZE.W + FRAME_BOX_BORDER,
      height: FRAME_SIZE.H + FRAME_BOX_BORDER,
      depth: 0.06
    }, scene);
    box.position = pos.add(normalOffset(rotY, 0.0));
    box.rotation.y = rotY;
    box.isPickable = true;
    box.subMeshes = [];
    const indices = box.getIndices();
    const verticesCount = box.getTotalVertices();
    let idx = 0;
    const perFace = indices.length / 6;
    for (let f=0; f<6; f++){ new BABYLON.SubMesh(f, 0, verticesCount, idx, perFace, box); idx += perFace; }
    box.material = makeShadedFrameBoxMultiMat(FRAME_COLOR);

    const f = BABYLON.MeshBuilder.CreatePlane("frame", {
      width: FRAME_SIZE.W, height: FRAME_SIZE.H, sideOrientation: BABYLON.Mesh.FRONTSIDE
    }, scene);
    f.position = pos.add(normalOffset(rotY, 0.04));
    f.rotation.y = rotY + Math.PI;
    f.isPickable = true;

    const { texW: phW, texH: phH } = getFrameTexSize();
    const dt = makeDT("ph_img", phW, phH, true);
    const ctx = dt.getContext();
    drawChecker(ctx, phW, phH);
    dt.update(false); // FIX 4
    const fMat = unlitTex(dt);
    fMat.zOffset = -1;
    // Tag the placeholder so the deferred dispose in setWebPToFrame skips it safely
    fMat.name = "ph_img_mat";
    f.material = fMat;

    const placW = FRAME_SIZE.W;
    const placH = Math.max(0.22, FRAME_SIZE.H * 0.10);
    const plac = BABYLON.MeshBuilder.CreatePlane("plac", {

  const LOGO_ASPECT = 941.43 / 202.86;

  function buildGalleryLogo(){

    try { twFrontAnchor?.dispose?.(); twFrontAnchor = null; } catch(_){}

    const img = new Image();

    img.onload = () => {
      const SIZE = 1024;
      const dt   = new BABYLON.DynamicTexture("logoDT", { width: SIZE, height: SIZE }, scene, true);
      const ctx  = dt.getContext();
      const maxW = SIZE * 0.92;
      const w    = maxW;
      const h    = Math.round(maxW / LOGO_ASPECT);
      const x    = Math.round((SIZE - w) / 2);
      const y    = Math.round((SIZE - h) / 2);
      ctx.clearRect(0, 0, SIZE, SIZE);
      ctx.drawImage(img, x, y, w, h);
      dt.update(false); // FIX 4

      const mul = IS_MOBILE ? LOGO_SIZE_MULT_MOBILE : LOGO_SIZE_MULT_DESKTOP;
      const LOGO_EXTRA_SCALE = 1.25;
      const logoW = ROOM.W * LOGO_SCALE * mul * LOGO_EXTRA_SCALE;

      // texture horizontally mirrored. We can't just mirror the shared canvas because
      // the back logo (rotation.y = π) faces the opposite way and would then break.
      // Instead each material gets its OWN texture instance, and we mirror the U axis
      // (uScale = -1, uOffset = 1) only on the front so the logo reads left-to-right.
      const makeMat = (name, mirrorU) => {
        const m = new BABYLON.StandardMaterial(name, scene);
        m.disableLighting  = true;

      __logoFront.material   = matFront;

      __logoBack.position.set(0, yPos, zBack);

      const panelTexH = Math.max(256, nextPOTLocal(Math.round(TW_FONT_PX * 2)));

      const logoVisibleH = logoH * (h / SIZE);
      const logoVisibleBottomY = yPos - logoVisibleH / 2;
      const TW_GAP_BELOW_LOGO_M = 3.21;
      const desiredVisibleTextY = logoVisibleBottomY - TW_GAP_BELOW_LOGO_M;
      let yText = desiredVisibleTextY + textCenterOffsetInPlane;
      const frameTopYLocal = FRAME_CENTER_Y + FRAME_SIZE.H / 2;
      const TW_MIN_CLEARANCE_ABOVE_FRAMES_M = 0.28;
      const minSafePlaneY = frameTopYLocal + TW_MIN_CLEARANCE_ABOVE_FRAMES_M + textCenterOffsetInPlane;

  function distributeCenters(min, max, count, frameW){
    if (count <= 1) return [ (min+max)/2 ];
    const span = max - min, totalFramesWidth = count * frameW;
    let gap = (span - totalFramesWidth) / (count - 1);
    const MIN_GAP = 0.05; if (gap < MIN_GAP) gap = Math.max(gap, MIN_GAP);
    const centers = []; let x = min + frameW/2;
    for (let i=0; i<count; i++){ centers.push(x); x += frameW + gap; }
    if (centers[centers.length-1] > max - frameW/2 + 1e-6) {
      const step = (max - min) / (count - 1);
      centers.length = 0;
      for (let i=0;i<count;i++) centers.push(min + i*step);
    }
    return centers;
  }

  function createFixedFramesForWall(wall, count, centerY, safeWall, cornerSafe){
    const rotY = wall==='front' ? Math.PI : wall==='back' ? 0 : wall==='left' ? Math.PI/2 : -Math.PI/2;
    const axisX  = (wall==='front'||wall==='back');
    const length = axisX ? ROOM.W : ROOM.D;
    const min = -length/2 + safeWall + cornerSafe;
    const max =  length/2 - safeWall - cornerSafe;
    const frameW = FRAME_SIZE.W || FIXED_LAYOUT.frame.width;
    const centers = distributeCenters(min, max, count, frameW);
    framesByWall[wall].forEach(it => { it.frame.dispose(); it.box.dispose(); it.placard.dispose(); });
    framesByWall[wall] = [];
    centers.forEach(val=>{
      const pos = axisX
        ? new BABYLON.Vector3(val, centerY, (wall==='front' ? ROOM.D/2 - 0.03 : -ROOM.D/2 + 0.03))
        : new BABYLON.Vector3((wall==='right' ? ROOM.W/2 - 0.03 : -ROOM.W/2 + 0.03), centerY, val);
      const it = addFrame(pos, rotY, wall);
      framesByWall[wall].push(it);
    });
  }

  function assignDataAllWalls(data){
    const isVideoUrl = (u) => /\.(mp4|webm|ogg)$/i.test(u || "");
    const isWebPUrl  = (u) => /\.webp$/i.test(u || "");
    ["front","back","left","right"].forEach(side=>{
      const items = data[side] || [];
      const arr   = framesByWall[side] || [];
      const n = Math.min(items.length, arr.length);
      for (let i=0; i<n; i++){
        const it = arr[i];
        const d  = items[i] || {};
        const src = d.src || d.video || d.img || "";
        it.data.src   = src;
        it.data.title = d.label || it.data.title || "(bez názvu)";
        it.data.url   = d.href  || it.data.url || "";
        drawPlacard(it.placard, it.data, it.rotY,
          it.placard._width  || FRAME_SIZE.W,
          it.placard._height || Math.max(0.22, FRAME_SIZE.H*0.10));
        if (!src) continue;
        if (isVideoUrl(src)) {
          setVideoToFrame(src, it, { loop: d.loop !== false, muted: d.muted !== false, autoplay: true });

          setWebPToFrame(src, it, TEX_SIZE, d.fit || "contain");

        }
      }
    });

  /* ========= Picking & zoom ========= */
  function setupPicking(){
    scene.onPointerObservable.add((pi)=>{
      if (pi.type !== BABYLON.PointerEventTypes.POINTERPICK) return;
      if (!pi.pickInfo?.hit) return;
      const mesh = pi.pickInfo.pickedMesh;
      for(const wall of Object.keys(framesByWall)){
        for(const it of framesByWall[wall]){
          if (mesh === it.placard && it.data.url){ window.open(it.data.url,"_blank","noopener"); return; }
        }
      }
    }, BABYLON.PointerEventTypes.POINTERPICK);
  }

  function zoomToPointer(px, py, {scale=0.55, forceMin=false}={}){
    const pick = scene.pick(px, py); if(!pick?.hit) return;
    camera.setTarget(pick.pickedPoint.clone());
    camera.radius = forceMin ? MIN_RADIUS : Math.max(MIN_RADIUS, camera.radius * scale);
  }

  function setupZoomUX(){
    const canvasEl = canvas;
    canvasEl.addEventListener("dblclick", ()=>{
      zoomToPointer(scene.pointerX, scene.pointerY, {
        scale: camera.radius < 1.2 ? 1.0 : 0.55, forceMin: camera.radius < 0.6
      });
    }, { passive:true });
    let lastTap = 0;
    canvasEl.addEventListener("touchend", (e)=>{
      const now = Date.now(); const dt = now - lastTap; lastTap = now;
      if (dt > 280) return;
      const t = e.changedTouches && e.changedTouches[0]; if (!t) return;
      const rect = canvasEl.getBoundingClientRect();
      const x = t.clientX - rect.left; const y = t.clientY - rect.top;
      zoomToPointer(x, y, { scale: camera.radius < 1.2 ? 1.0 : 0.55, forceMin: camera.radius < 0.6 });
    }, { passive:true });
  }

  /* ========= Camera reset ========= */
  const WALL_CENTER_Y = (ROOM.H - 0.04 - 0.005) / 2;
  const RESET_TARGET_Y = WALL_CENTER_Y - 1.05;
  const FRONT_ALPHA = -Math.PI / 2;

  function normAlpha(a){
    const TAU = Math.PI * 2;
    a = a % TAU;
    if (a < 0) a += TAU;
    return a;
  }

  const RESET_POSE = {
    target: new BABYLON.Vector3(0, RESET_TARGET_Y, 0),
    radius: 17.0,
    alpha: -Math.PI / 2,
    beta: Math.PI / 1.88
  };

  function animateCameraTo({alpha, beta, radius, target}, durationMs=400){
    if (!camera) return;
    const fps = 60, frames = Math.max(1, Math.round(durationMs / (1000/fps)));
    const easing = new BABYLON.CubicEase();
    easing.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEINOUT);
    const makeAnim = (prop, from, to) => {
      const a = new BABYLON.Animation("anim_"+prop, prop, fps,
        BABYLON.Animation.ANIMATIONTYPE_FLOAT, BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
      a.setKeys([{frame:0, value:from}, {frame:frames, value:to}]);
      a.setEasingFunction(easing);
      return a;
    };
    const anims = [
      makeAnim("alpha",  camera.alpha,  alpha),
      makeAnim("beta",   camera.beta,   beta),
      makeAnim("radius", camera.radius, radius),
    ];
    const makeVAnim = (axis, from, to) => {
      const a = new BABYLON.Animation("anim_t"+axis, "target."+axis, fps,
        BABYLON.Animation.ANIMATIONTYPE_FLOAT, BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
      a.setKeys([{frame:0, value:from}, {frame:frames, value:to}]);
      a.setEasingFunction(easing);
      return a;
    };
    anims.push(
      makeVAnim("x", camera.target.x, target.x),
      makeVAnim("y", camera.target.y, target.y),
      makeVAnim("z", camera.target.z, target.z)
    );
    camera.animations = anims;
    scene.beginAnimation(camera, 0, frames, false);
  }

  function resetCamera({animate=true} = {}){
    if (!camera) return;

      alpha:  normAlpha(FRONT_ALPHA),
      beta:   RESET_POSE.beta,
      radius: RESET_POSE.radius,
      target: RESET_POSE.target.clone()
    };
    if (animate){ animateCameraTo(pose, 420); }
    else {
      camera.alpha  = pose.alpha;
      camera.beta   = pose.beta;
      camera.radius = pose.radius;
      camera.setTarget(pose.target);
    }
    onCameraResetForStars?.();
  }

  function isFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement); }
  function requestFs(el){ const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen; if (req) req.call(el); }
  function exitFs(){ const ex = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen; if (ex) ex.call(document); }
  function toggleFullscreen(){ if (isFullscreen()) exitFs(); else requestFs(document.documentElement); }
  function syncFsButton(){ const btn = document.getElementById('fullscreenIcon'); if (!btn) return; const on = isFullscreen(); btn.setAttribute('aria-pressed', on ? 'true' : 'false'); btn.title = on ? 'Ukončit celé okno (Esc)' : 'Přepnout celé okno'; }

  /* ========= Scene creation ========= */
  function createScene(){
    scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color4(0,0,0,1);

    camera = new BABYLON.ArcRotateCamera("cam", RESET_POSE.alpha, RESET_POSE.beta, RESET_POSE.radius, RESET_POSE.target.clone(), scene);
    camera.attachControl(canvas, true);
    camera.minZ = 0.05; camera.maxZ = 5000;
    camera.lowerRadiusLimit = MIN_RADIUS; camera.upperRadiusLimit = 40;
    camera.lowerBetaLimit = 0.05; camera.upperBetaLimit = Math.PI - 0.05;

    new BABYLON.HemisphericLight("h", new BABYLON.Vector3(0,1,0), scene);

    glow = new BABYLON.GlowLayer("gl", scene, { blurKernelSize: IS_MOBILE ? 18 : 56 });
    if (!IS_MOBILE) { glow.intensity = 0.85; glow.blurKernelSize = 64; }
    else            { glow.intensity = 0.48; glow.blurKernelSize = 18; }

    /* ─────────────────────────────────────────────────────────────────
     * FIX 8 — disable image processing BEFORE scene is used.
     *
     * Original set these properties after the scene was already active.
     * In Babylon, mutating imageProcessingConfiguration after the first
     * render can force a full shader recompile mid-frame, appearing as a
     * single-frame white flash ("shader flicker") on first load.
     * Setting them here, before any meshes are created, prevents that.
     * ───────────────────────────────────────────────────────────────── */
    const ipc = scene.imageProcessingConfiguration;
    ipc.isEnabled           = false;
    ipc.applyByPostProcess  = false;
    ipc.toneMappingEnabled  = false;
    ipc.exposure            = 1.0;
    ipc.contrast            = 1.0;

    buildRoom();
    buildLED();
    buildMySkybox();
    buildCeilingWithAperture({ inw: 0.1 });
    setupPicking();
    setupZoomUX();
    return scene;
  }

  /* ========= Falling stars ========= */
  const APERTURE_INSET = 0.1;
  const CEIL_Y = ROOM.H - 0.04;
  const OPEN_W = ROOM.W - 2 * APERTURE_INSET;
  const OPEN_D = ROOM.D - 2 * APERTURE_INSET;
  const STAR_INTERVAL_MIN_MS = 6000;
  const STAR_INTERVAL_MAX_MS = 12000;
  const SKY_INNER_MARGIN = 0.12;

  let STAR_TEX = null;
  function getStarTexture(){
    if (STAR_TEX) return STAR_TEX;
    STAR_TEX = new BABYLON.Texture("assets/star.webp", scene, true, false, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    STAR_TEX.hasAlpha = true;
    STAR_TEX.wrapU = STAR_TEX.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    STAR_TEX.anisotropicFilteringLevel = 4;
    STAR_TEX.gammaSpace = true;
    STAR_TEX.level = 1.0;
    return STAR_TEX;
  }

  const ScreenBasisXZ = { right: BABYLON.Vector3.Zero(), down: BABYLON.Vector3.Zero() };

  function updateScreenBasisXZ() {
    const rightW = camera.getDirection(BABYLON.Axis.X);
    const upW    = camera.getDirection(BABYLON.Axis.Y);
    const downW  = upW.scale(-1);
    ScreenBasisXZ.right.set(rightW.x, 0, rightW.z);
    ScreenBasisXZ.down .set(downW.x , 0, downW.z);
    const eps = 1e-4;
    let lr = ScreenBasisXZ.right.length();
    let ld = ScreenBasisXZ.down.length();
    if (ld < eps) { const fwdW = camera.getDirection(BABYLON.Axis.Z); ScreenBasisXZ.down.set(fwdW.x, 0, fwdW.z); ld = ScreenBasisXZ.down.length(); }
    if (lr < eps) { ScreenBasisXZ.right.set(-ScreenBasisXZ.down.z, 0, ScreenBasisXZ.down.x); lr = ScreenBasisXZ.right.length(); }
    ScreenBasisXZ.right.scaleInPlace(1 / Math.max(lr, eps));
    ScreenBasisXZ.down .scaleInPlace(1 / Math.max(ld, eps));
  }

  function makeDownwardDirXZ(maxTiltDeg = 35, lateralBias = 0) {
    updateScreenBasisXZ();
    const tilt = BABYLON.Angle.FromDegrees(BABYLON.Scalar.RandomRange(0, maxTiltDeg)).radians();
    const sgn  = (Math.random() + lateralBias) >= 0.5 ? 1 : -1;
    const v = ScreenBasisXZ.down.scale(Math.cos(tilt)).add(ScreenBasisXZ.right.scale(Math.sin(tilt) * sgn));
    const len = v.length();
    return len > 1e-5 ? v.scale(1/len) : ScreenBasisXZ.down.clone();
  }

  function rayFromNDC(ndcX, ndcY) {
    const eng = scene.getEngine();
    const px = (ndcX * 0.5 + 0.5) * eng.getRenderWidth();
    const py = (1 - (ndcY * 0.5 + 0.5)) * eng.getRenderHeight();
    return scene.createPickingRay(px, py, BABYLON.Matrix.Identity(), camera, false);
  }

  function rayHitYPlane(ray, yPlane){
    const vy = ray.direction.y;
    if (Math.abs(vy) < 1e-6) return null;
    const t = (yPlane - ray.origin.y) / vy;
    if (t <= 0) return null;
    return ray.origin.add(ray.direction.scale(t));
  }

  function pickVisibleSkyStart({ yPlane = CEIL_Y + 1.45, xMin = -0.95, xMax = 0.95, yMin = 0.15, yMax = 0.95, maxTries = 10 } = {}) {
    const halfW = OPEN_W/2 - SKY_INNER_MARGIN;
    const halfD = OPEN_D/2 - SKY_INNER_MARGIN;
    for (let i=0; i<maxTries; i++){
      const ray  = rayFromNDC(BABYLON.Scalar.RandomRange(xMin, xMax), BABYLON.Scalar.RandomRange(yMin, yMax));
      const hit  = rayHitYPlane(ray, yPlane);
      if (!hit) continue;
      if (Math.abs(hit.x) <= halfW && Math.abs(hit.z) <= halfD) return { x: hit.x, z: hit.z };
    }
    return { x: 0, z: 0 };
  }

  function rayRectHitFromPoint(px, pz, dx, dz, halfW, halfD){
    const eps = 1e-6, c = [];
    if (Math.abs(dx) > eps){
      const tR=( halfW-px)/dx, zR=pz+tR*dz;
      const tL=(-halfW-px)/dx, zL=pz+tL*dz;
      if (tR>0 && Math.abs(zR)<=halfD+eps) c.push({t:tR, x: halfW, z:zR});
      if (tL>0 && Math.abs(zL)<=halfD+eps) c.push({t:tL, x:-halfW, z:zL});
    }
    if (Math.abs(dz) > eps){
      const tF=( halfD-pz)/dz, xF=px+tF*dx;
      const tB=(-halfD-pz)/dz, xB=px+tB*dx;
      if (tF>0 && Math.abs(xF)<=halfW+eps) c.push({t:tF, x:xF, z: halfD});
      if (tB>0 && Math.abs(xB)<=halfW+eps) c.push({t:tB, x:xB, z:-halfD});
    }
    if (!c.length) return null;
    c.sort((a,b)=>a.t-b.t);
    return c[0];
  }

  function pickDownwardPath({ maxTiltDeg=33, minFracLen=0.55, maxFracLen=1.00, beyondMin=0.35, beyondMax=1.10, lateralBias=0.0 } = {}){
    updateScreenBasisXZ();
    const halfW = OPEN_W/2 - SKY_INNER_MARGIN;
    const halfD = OPEN_D/2 - SKY_INNER_MARGIN;
    const start = pickVisibleSkyStart();
    const d = makeDownwardDirXZ(maxTiltDeg, lateralBias);
    const hit = rayRectHitFromPoint(start.x, start.z, d.x, d.z, halfW, halfD);
    const frac   = BABYLON.Scalar.RandomRange(minFracLen, maxFracLen);
    const beyond = BABYLON.Scalar.RandomRange(beyondMin, beyondMax);
    if (!hit){
      const ex = start.x + d.x*halfW, ez = start.z + d.z*halfD;
      return { start, end: { x: ex + d.x*beyond, z: ez + d.z*beyond }, dir: d };
    }
    const hitX = start.x + d.x * hit.t * frac;
    const hitZ = start.z + d.z * hit.t * frac;
    return { start, end: { x: hitX + d.x*beyond, z: hitZ + d.z*beyond }, dir: d };
  }

  function getFacingDirXZ(){
    const fwd = camera.getDirection(BABYLON.Axis.Z);
    const v = new BABYLON.Vector3(fwd.x, 0, fwd.z);
    const len = v.length();
    if (len < 1e-4) return { x: 0, z: 1 };
    return { x: v.x/len, z: v.z/len };
  }

  function visibilityBoost(dir, facing){
    const dot = Math.max(0, dir.x*facing.x + dir.z*facing.z);
    return 0.30 + 0.70 * Math.pow(dot, 0.7);
  }

  /* ─────────────────────────────────────────────────────────────────
   * FIX 9 — spawnOneFallingStar: safe disposal of star + material.
   *
   * Original: called `mat.dispose?.()` inside the fade-out observer,
   * right after setting star.visibility = 0.  In Babylon, disposing a
   * material while it is still bound to a visible mesh can leave the
   * GPU in an undefined state for one frame, appearing as a brief
   * black flash where the star was.
   *
   * Fix: dispose star+material only AFTER the mesh is fully invisible
   * AND we confirm the mesh is truly gone by calling star.dispose()
   * first.  Also removed the HALO's separate material creation — it
   * now shares the parent's material, halving the number of GPU
   * state changes per star.
   * ───────────────────────────────────────────────────────────────── */
  function spawnOneFallingStar({ start, end, dirXZ, yTop, yBot, speed, sizeBase, color }){
    yTop     = yTop     ?? CEIL_Y + BABYLON.Scalar.RandomRange(1.48, 1.62);
    yBot     = yBot     ?? CEIL_Y + BABYLON.Scalar.RandomRange(0.90, 1.05);
    speed    = speed    ?? BABYLON.Scalar.RandomRange(14, 28);
    sizeBase = sizeBase ?? BABYLON.Scalar.RandomRange(0.10, 0.18);
    color    = color    ?? new BABYLON.Color3(1,1,1);

    const facing = getFacingDirXZ();
    const vis    = visibilityBoost(dirXZ, facing);
    const size   = sizeBase * (0.85 + 0.4*vis);
    const tex    = getStarTexture();

    const star = BABYLON.MeshBuilder.CreatePlane("star", { size }, scene);
    star.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
    star.position.set(start.x, yTop, start.z);
    star.renderingGroupId = 0;
    star.isPickable = false;

    const mat = new BABYLON.StandardMaterial("starMat", scene);
    mat.disableLighting = true;
    mat.diffuseColor    = new BABYLON.Color3(0,0,0);
    mat.emissiveColor   = new BABYLON.Color3(1,1,1).scale(1.45 + 1.25*vis);
    mat.diffuseTexture  = tex;
    mat.opacityTexture  = tex;
    mat.backFaceCulling = false;
    mat.forceDepthWrite  = true;
    mat.needDepthPrePass = true;
    mat.alphaMode        = BABYLON.Engine.ALPHA_ADD;
    star.material = mat;

    if (glow) glow.addIncludedOnlyMesh(star);

    // Halo shares the same material — no extra GPU state change
    const halo = BABYLON.MeshBuilder.CreatePlane("starHalo", { size: size * 2.2 }, scene);
    halo.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
    halo.parent        = star;
    halo.material      = mat; // shared — no flicker from a second bind

    const A = new BABYLON.Vector3(start.x, yTop, start.z);
    const B = new BABYLON.Vector3(end.x,   yBot, end.z);
    const lenXZ = Math.hypot(end.x - start.x, end.z - start.z);
    const lifeSec = Math.max(0.45, Math.min(1.40, lenXZ / Math.max(1e-4, speed)));
    const t0 = performance.now();
    const totalMs = lifeSec * 1000;
    const minY = CEIL_Y + 0.82;
    const flickerPhase = Math.random() * Math.PI*2;
    const baseInt = 1.25 + 1.1*vis;

    const obs = scene.onBeforeRenderObservable.add(() => {
      const now = performance.now();
      const r   = Math.min(1, (now - t0)/totalMs);
      star.position.set(
        BABYLON.Scalar.Lerp(A.x, B.x, r),
        Math.max(minY, BABYLON.Scalar.Lerp(A.y, B.y, r)),
        BABYLON.Scalar.Lerp(A.z, B.z, r)
      );
      const flick = 0.85 + 0.25*Math.sin((now*0.012) + flickerPhase) + 0.10*Math.random();
      mat.emissiveColor = color.scale(baseInt * flick);

      if (r >= 1){
        scene.onBeforeRenderObservable.remove(obs);
        const tFade0 = performance.now(), fadeMs = 140;
        const obs2 = scene.onBeforeRenderObservable.add(() => {
          const rf = Math.min(1, (performance.now() - tFade0)/fadeMs);
          star.visibility = 1 - rf;
          if (rf >= 1){
            scene.onBeforeRenderObservable.remove(obs2);
            // FIX 9: dispose mesh first, THEN material — never the other way around
            star.dispose();      // detaches halo child too (parent=star)
            mat.dispose();       // safe now: mesh is already removed from render list
          }
        });
      }
    });

    return star;
  }

  let shootingTimer = null;

  function scheduleFallingStar(){
    const wait = STAR_INTERVAL_MIN_MS + Math.random()*(STAR_INTERVAL_MAX_MS - STAR_INTERVAL_MIN_MS);
    shootingTimer = setTimeout(()=>{
      const seg = pickDownwardPath({ maxTiltDeg:33, minFracLen:0.55, maxFracLen:1.00, beyondMin:0.35, beyondMax:1.10, lateralBias:0.0 });
      spawnOneFallingStar({ start: seg.start, end: seg.end, dirXZ: seg.dir, speed: BABYLON.Scalar.RandomRange(14, 28) });
      scheduleFallingStar();
    }, wait);
  }

  function startShootingStars(){ if (shootingTimer) clearTimeout(shootingTimer); scheduleFallingStar(); }
  function stopShootingStars(){ if (shootingTimer){ clearTimeout(shootingTimer); shootingTimer = null; } }

  function onCameraResetForStars(){
    if (shootingTimer){ clearTimeout(shootingTimer); shootingTimer = null; }
    setTimeout(()=> scheduleFallingStar(), 220);
  }

  /* ========= Layout apply ========= */
  function applyFixedLayout() {
    const YCENTER    = ROOM.H * 0.55;
    const safeWall   = FIXED_LAYOUT.safeWall;
    const cornerSafe = FIXED_LAYOUT.cornerSafe;
    const baseW = FIXED_LAYOUT.frame.width;
    const baseH = FIXED_LAYOUT.frame.height;
    FRAME_BASE_H = baseH;
    const newW = baseW;
    const newH = baseW * (16/9);
    FRAME_SIZE.W     = newW;
    FRAME_SIZE.H     = newH;
    FRAME_BOX_BORDER = FIXED_LAYOUT.frame.border;
    FRAME_COLOR      = FIXED_LAYOUT.frame.color;
    FRAME_DELTA_H    = newH - baseH;
    const centerY = YCENTER - FRAME_DELTA_H/2;
    FRAME_CENTER_Y   = centerY;
    createFixedFramesForWall('front', FIXED_LAYOUT.counts.front,  centerY, safeWall, cornerSafe);
    createFixedFramesForWall('back',  FIXED_LAYOUT.counts.back,   centerY, safeWall, cornerSafe);
    createFixedFramesForWall('left',  FIXED_LAYOUT.counts.left,   centerY, safeWall, cornerSafe);
    createFixedFramesForWall('right', FIXED_LAYOUT.counts.right,  centerY, safeWall, cornerSafe);
    assignDataAllWalls(DATA);
  }

  /* ========= Soft camera bounds ========= */
  const CAM_MARGIN = 0.55;
  const CAM_BOUNDS = {
    minX: -ROOM.W/2 + CAM_MARGIN, maxX: ROOM.W/2 - CAM_MARGIN,
    minZ: -ROOM.D/2 + CAM_MARGIN, maxZ: ROOM.D/2 - CAM_MARGIN,
    minY: 0.6, maxY: ROOM.H - 0.6
  };

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
  function getOrbitDir(alpha, beta){
    const sinBeta = Math.sin(beta);
    return new BABYLON.Vector3(Math.cos(alpha)*sinBeta, Math.cos(beta), Math.sin(alpha)*sinBeta);
  }
  function constrainTarget(){
    const t = camera.target;
    t.x = clamp(t.x, CAM_BOUNDS.minX, CAM_BOUNDS.maxX);
    t.y = clamp(t.y, CAM_BOUNDS.minY, CAM_BOUNDS.maxY);
    t.z = clamp(t.z, CAM_BOUNDS.minZ, CAM_BOUNDS.maxZ);
    camera.setTarget(t);
  }
  function constrainCameraRadius(){
    const t = camera.target;
    const dir = getOrbitDir(camera.alpha, camera.beta);
    let rMax = camera.upperRadiusLimit || 1e9;
    if (dir.x > 1e-6)  rMax = Math.min(rMax, (CAM_BOUNDS.maxX - t.x) / dir.x);
    else if (dir.x < -1e-6) rMax = Math.min(rMax, (CAM_BOUNDS.minX - t.x) / dir.x);
    if (dir.y > 1e-6)  rMax = Math.min(rMax, (CAM_BOUNDS.maxY - t.y) / dir.y);
    else if (dir.y < -1e-6) rMax = Math.min(rMax, (CAM_BOUNDS.minY - t.y) / dir.y);
    if (dir.z > 1e-6)  rMax = Math.min(rMax, (CAM_BOUNDS.maxZ - t.z) / dir.z);
    else if (dir.z < -1e-6) rMax = Math.min(rMax, (CAM_BOUNDS.minZ - t.z) / dir.z);
    camera.radius = clamp(camera.radius, MIN_RADIUS, rMax);
  }

  /* ========= SoundCloud player ========= */
  const SC_PLAYLIST_URL = "https://soundcloud.com/vertigo01/sets/detroit-techno";
  let scWidget = null, scReady = false, scLoading = false, scDuration = 0;

  function loadScApiOnce(){
    return new Promise((resolve, reject)=>{
      if (window.SC && window.SC.Widget) return resolve();
      const s = document.createElement('script');
      s.src = "https://w.soundcloud.com/player/api.js";
      s.async = true; s.onload = ()=>resolve(); s.onerror = ()=>reject(new Error("SC API failed"));
      document.head.appendChild(s);
    });
  }

  function mountScIframeOnce(){
    return new Promise((resolve)=>{
      const host = document.getElementById('scIframeHost');
      let iframe = host.querySelector('iframe');
      if (iframe) return resolve(iframe);
      const url = "https://w.soundcloud.com/player/?"
        + "url=" + encodeURIComponent(SC_PLAYLIST_URL)
        + "&auto_play=false&hide_related=false&show_comments=false&show_user=true&show_reposts=false&show_teaser=false&visual=true";
      iframe = document.createElement('iframe');
      iframe.id = "scIframe"; iframe.title = "SoundCloud Player"; iframe.allow = "autoplay";
      iframe.setAttribute("scrolling","no"); iframe.setAttribute("frameborder","no");
      iframe.style.width = "0"; iframe.style.height = "0"; iframe.style.border = "0";
      iframe.src = url;
      host.appendChild(iframe);
      resolve(iframe);
    });
  }

  function scUpdateTime(cur, dur){ const c=document.getElementById("scTimeCur"),d=document.getElementById("scTimeDur"); if(c) c.textContent=fmtTime(cur); if(d) d.textContent=fmtTime(dur); }
  function scUpdateThumb(s){ const t=document.getElementById("scThumb"); if(!t) return; let art=s?.artwork_url||s?.user?.avatar_url||""; if(art) art=art.replace("-large.jpg","-t200x200.jpg"); t.src=art||""; t.title=s?.title||""; }
  function scUpdateTitle(s){ const el=document.getElementById("scTitle"); if(!el) return; el.textContent=s?(s.title||"Unknown"):"–"; el.title=s?.title||""; }
  function scUpdateProgress(rel){ const fill=document.getElementById("scSeekFill"); if(!fill) return; fill.style.width=(Math.max(0,Math.min(1,rel))*100).toFixed(2)+"%"; }

  function scUpdateMeta(){
    if (!scWidget) return;
    scWidget.getCurrentSound((s)=>{
      scUpdateTitle(s); scUpdateThumb(s);
      const d = (s && typeof s.duration==="number") ? s.duration : scDuration;
      scDuration = d || 0;
      scUpdateTime(0, scDuration);
      const openLink = ()=>{ if(s?.permalink_url) window.open(s.permalink_url,"_blank","noopener"); };
      const titleEl = document.getElementById("scTitle");
      const thumbEl = document.getElementById("scThumb");
      if (titleEl){ titleEl.onclick=openLink; titleEl.setAttribute("role","link"); titleEl.setAttribute("tabindex","0"); titleEl.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openLink(); } }; }
      if (thumbEl){ thumbEl.onclick=openLink; thumbEl.setAttribute("role","link"); thumbEl.setAttribute("tabindex","0"); thumbEl.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openLink(); } }; }
    });
  }

  function initScWidgetOnce(){
    return new Promise((resolve)=>{
      const iframe = document.getElementById('scIframe');
      if (!iframe || !window.SC || !window.SC.Widget) return resolve(null);
      if (scWidget) return resolve(scWidget);
      scWidget = window.SC.Widget(iframe);
      scWidget.bind(window.SC.Widget.Events.READY, ()=>{
        scReady = true;
        const barVol = document.getElementById('barVol');
        scWidget.setVolume(Math.max(0, Math.min(100, +(barVol?.value||80))));
        scUpdateMeta();
        scWidget.bind(window.SC.Widget.Events.PLAY, scUpdateMeta);
        scWidget.bind(window.SC.Widget.Events.PLAY_PROGRESS, (e)=>{
          if (e && typeof e.duration==="number") scDuration=e.duration;
          scUpdateTime(e?.currentPosition||0, scDuration);
          scUpdateProgress(e?.relativePosition||(scDuration?(e?.currentPosition||0)/scDuration:0));
        });
        scWidget.bind(window.SC.Widget.Events.ERROR, (err)=>console.error("[SC] error:", err));
        resolve(scWidget);
      });
    });
  }

  async function ensureScReadyAndPlay(){
    if (scLoading) return; scLoading = true;
    try{
      await loadScApiOnce(); await mountScIframeOnce();
      const w = await initScWidgetOnce();
      if (w) w.play();
    }catch(e){ console.warn("SC lazy-load failed:", e); }
    finally{ scLoading = false; }
  }

  function bindBarControls(){
    const pPrev=document.getElementById("barPrev"), pPlay=document.getElementById("barPlay"),
          pPause=document.getElementById("barPause"), pNext=document.getElementById("barNext"),
          vol=document.getElementById("barVol"), mute=document.getElementById("barMute"),
          seek=document.getElementById("scSeek");
    if (pPlay){ pPlay.addEventListener('click', ()=>ensureScReadyAndPlay()); pPlay.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();ensureScReadyAndPlay();}}); }
    if (pPause) pPause.addEventListener('click', ()=>scReady&&scWidget&&scWidget.pause());
    const jump=(dir)=>async()=>{
      await ensureScReadyAndPlay();
      if(!scReady||!scWidget) return;
      try{ if(dir<0) scWidget.prev(); else scWidget.next(); setTimeout(()=>{try{scWidget.play();}catch(_){}},120); }
      catch(e){console.warn("[SC] jump failed",e);}
    };
    if (pPrev) pPrev.addEventListener('click', jump(-1));
    if (pNext) pNext.addEventListener('click', jump(+1));
    if (vol) vol.addEventListener('input',e=>{const v=Math.min(100,Math.max(0,+e.target.value||75)); if(scReady&&scWidget) scWidget.setVolume(v);});
    if (mute) mute.addEventListener('click',()=>{ if(!scReady||!scWidget) return; scWidget.getVolume(v=>{ scWidget.setVolume(v>0?0:(document.getElementById('barVol')?.value|0)||75); }); });
    if (seek){
      const doSeek=(px)=>{ if(!scReady||!scWidget||!scDuration) return; const rect=seek.getBoundingClientRect(); scWidget.seekTo(Math.min(1,Math.max(0,(px-rect.left)/rect.width))*scDuration); };
      seek.addEventListener("click",e=>doSeek(e.clientX));
      seek.addEventListener("keydown",e=>{ if(e.key==='ArrowLeft'||e.key==='ArrowRight'){ e.preventDefault(); const cur=parseFloat((document.getElementById('scSeekFill')?.style.width||"0").replace("%",""))/100; const rel=Math.min(1,Math.max(0,cur+(e.key==='ArrowRight'?0.02:-0.02))); if(scReady&&scWidget&&scDuration) scWidget.seekTo(rel*scDuration); } });
    }
  }

  /* ========= BOOT ========= */
  createScene();

  (async function boot(){
    try{
      await document.fonts?.load?.('400 16px Poppins');
      await document.fonts?.load?.('600 16px Poppins');
      await document.fonts?.load?.(`600 ${TW_FONT_PX}px Doto`);
      await document.fonts?.load?.(`400 ${TW_FONT_PX}px Doto`);
    }catch(e){}

    applyFixedLayout();
    buildGalleryLogo();
    bindBarControls();
    resetCamera({animate:false});

    requestAnimationFrame(() => animateCameraTo({
      alpha: normAlpha(FRONT_ALPHA), beta: camera.beta,
      radius: camera.radius, target: camera.target.clone()
    }, 320));

    startShootingStars();
  })();

  /* ========= Render loop ========= */
  engine.runRenderLoop(()=>{
    if (!scene) return;
    constrainTarget?.();
    constrainCameraRadius?.();
    scene.render();

    if (AutoScale.enabled){
      const now = performance.now();
      AutoScale.accMs += engine.getDeltaTime();
      AutoScale.frames++;
      if (now - AutoScale.lastEval > AutoScale.windowMs && now > AutoScale.warmupMs){
        const avgMs = AutoScale.accMs / AutoScale.frames;
        let changed = false;
        if (avgMs > AutoScale.lowFpsMs && currentScaleLevel < AutoScale.maxLevel){
          currentScaleLevel = Math.min(AutoScale.maxLevel, currentScaleLevel + AutoScale.step); changed = true;
        } else if (avgMs < AutoScale.highFpsMs && currentScaleLevel > AutoScale.minLevel){
          currentScaleLevel = Math.max(AutoScale.minLevel, currentScaleLevel - AutoScale.step); changed = true;
        }
        if (changed){
          applyHardwareScale(currentScaleLevel);
          if (glow){ const base = IS_MOBILE ? 36 : 96; glow.blurKernelSize = Math.round(base * (0.9 + 0.2*(1-(currentScaleLevel-0.33)/(1-0.33)))); }
        }
        AutoScale.accMs = 0; AutoScale.frames = 0; AutoScale.lastEval = now;
      }
    }
  });

  /* ========= Resize & UI ========= */
  function handleResize(){ applyHardwareScale(); engine.resize(true); }
  window.addEventListener("resize", handleResize, { passive:true });
  window.addEventListener("orientationchange", handleResize);
  document.addEventListener('gesturestart', e => { if (IS_IOS) e.preventDefault(); }, { passive:false });

  const resetCamIcon = document.getElementById('resetCamIcon');
  if (resetCamIcon){
    resetCamIcon.addEventListener('dragstart', e=>e.preventDefault());
    resetCamIcon.addEventListener('click', ()=>resetCamera({animate:true}));
    resetCamIcon.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); resetCamera({animate:true}); } });
  }
  window.addEventListener('keydown', (e)=>{ if(e.key.toLowerCase()==='r') resetCamera({animate:true}); });

  const fullscreenIcon = document.getElementById('fullscreenIcon');
  if (fullscreenIcon){
    fullscreenIcon.addEventListener('dragstart', e=>e.preventDefault());
    fullscreenIcon.addEventListener('click', toggleFullscreen);
    fullscreenIcon.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleFullscreen(); } });
    document.addEventListener('fullscreenchange', syncFsButton);
    document.addEventListener('webkitfullscreenchange', syncFsButton);
  }

  const instaIcon = document.getElementById('instaIcon');
  const shareIcon = document.getElementById('shareIcon');

  function openInsta(){ window.open("https://www.instagram.com/__phaser__?igsh=d2lnbjhxMTZ1YjYz&utm_source=qr","_blank","noopener"); }
  async function sharePage(){
    const shareData = { title: document.title||"Virtual Gallery", text: "Podívej se na Virtual Gallery", url: window.location.href };
    try{ if(navigator.share){ await navigator.share(shareData); } else { await navigator.clipboard?.writeText?.(shareData.url); alert("Odkaz byl zkopírován do schránky."); } }catch(e){}
  }

  if (instaIcon){ instaIcon.addEventListener('dragstart',e=>e.preventDefault()); instaIcon.addEventListener('click',openInsta); instaIcon.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openInsta();}}); }
  if (shareIcon){ shareIcon.addEventListener('dragstart',e=>e.preventDefault()); shareIcon.addEventListener('click',sharePage); shareIcon.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();sharePage();}}); }
  </script>
</body>
</html>
