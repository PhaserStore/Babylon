<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Virtual Gallery — Clean View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;600&display=swap" rel="stylesheet" />

  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&family=Danfo&family=DotGothic16&family=Geostar+Fill&family=Handjet:wght@100..900&family=Jacquard+12&family=Kelly+Slab&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik+Broken+Fax&family=Tektur:wght@400..900&family=Tomorrow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tourney:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@400..900&display=swap" rel="stylesheet">

  <style>
    :root{
      --txt:#fff; --txt-dim:#ccc;
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --bar-h: 54px;
      --btn-bg:#2b2b2b;
      --btn-bg-hover:#3a3a3a;
      --btn-brd:rgba(255,255,255,.15);
      --accent:#ff6a00;
      --phaser-green:#daff3e; /* shared brand green (matches logo + typewriter) */
      --icon-size: 56px;
      --dock-pad: 10px;
    }
    html,body{
      width:100%; height:100%; margin:0; overflow:hidden; background:#111; color:var(--txt);
      font-family:'Poppins',sans-serif;
    }
    #renderCanvas{
      position:fixed; inset:0; display:block; touch-action:none; width:100vw; height:100vh;
      /* FIX 1: explicit compositing layer — prevents browser from re-compositing the canvas
         every frame alongside DOM elements, which was causing the flicker seam at the
         canvas/HUD boundary. */
      will-change: transform;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* ===== FUTURISTIC SCANNER LOADING ===== */
    #loadingOverlay{
      position:fixed; inset:0; z-index:20000;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:14px;
      background:
        radial-gradient(circle at 50% 42%, rgba(218,255,62,.05) 0%, rgba(218,255,62,.02) 18%, transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.015), rgba(255,255,255,0)),
        #000;
      color:var(--txt);
      opacity:1;
      transition:opacity .55s ease;
      will-change:opacity;
      transform:translateZ(0);
      -webkit-tap-highlight-color:transparent;
      padding: calc(20px + var(--safe-top)) 24px calc(20px + var(--safe-bottom));
      overflow:hidden;
    }

    #loadingOverlay::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.028) 0px,
          rgba(255,255,255,.028) 1px,
          transparent 1px,
          transparent 6px
        );
      opacity:.18;
      mix-blend-mode:screen;
    }

    #loadingOverlay::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 50%, rgba(218,255,62,.035), transparent 55%);
      animation:loadingOverlayPulse 3.2s ease-in-out infinite;
    }

    #loadingOverlay.is-hidden{
      opacity:0;
      pointer-events:none;
    }

    #loadingLogo{
      position:relative;
      z-index:2;
      width:min(60vw, 360px);
      height:auto;
      display:block;
      filter:
        drop-shadow(0 0 12px rgba(218,255,62,.18))
        drop-shadow(0 0 26px rgba(218,255,62,.10));
      user-select:none;
      -webkit-user-drag:none;
      animation:loadingLogoBreath 2.6s ease-in-out infinite;
    }

    #loadingBarWrap{
      position:relative;
      z-index:2;
      width:min(86vw, 540px);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      margin-top:-2px;
    }

    #loadingScanLabel{
      font-family:"Michroma", sans-serif;
      font-weight:400;
      font-size:10px;
      letter-spacing:.30em;
      text-transform:uppercase;
      color:rgba(218,255,62,.72);
      opacity:.95;
      text-align:center;
    }

    #loadingBarTrack{
      position:relative;
      width:100%;
      height:2px;
      border-radius:4px;
      overflow:hidden;
      background:
        linear-gradient(90deg,
          rgba(255,255,255,.05) 0%,
          rgba(255,255,255,.16) 50%,
          rgba(255,255,255,.05) 100%);
      box-shadow:
        0 0 0 1px rgba(218,255,62,.04) inset,
        0 0 14px rgba(218,255,62,.04);
    }

    #loadingBarTrack::before{
      content:"";
      position:absolute;
      left:0; right:0; top:50%;
      height:1px;
      transform:translateY(-50%);
      background:rgba(218,255,62,.10);
      filter:blur(.4px);
      opacity:.75;
    }

    #loadingBarFill{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:0%;
      border-radius:4px;
      background:
        linear-gradient(90deg,
          rgba(218,255,62,.18) 0%,
          rgba(218,255,62,.85) 45%,
          rgba(244,255,158,.95) 100%);
      box-shadow:
        0 0 10px rgba(218,255,62,.36),
        0 0 22px rgba(218,255,62,.16);
      transition:width .24s ease;
      overflow:visible;
    }

    #loadingBarFill::after{
      content:"";
      position:absolute;
      right:-16px;
      top:50%;
      width:46px;
      height:14px;
      transform:translateY(-50%);
      pointer-events:none;
      background:
        linear-gradient(90deg,
          rgba(218,255,62,0) 0%,
          rgba(218,255,62,.95) 48%,
          rgba(244,255,158,0) 100%);
      filter:blur(4px);
      opacity:.95;
    }

    #loadingScanSweep{
      position:absolute;
      inset:-12px 0;
      pointer-events:none;
      overflow:hidden;
      z-index:1;
    }

    #loadingScanSweep::before{
      content:"";
      position:absolute;
      top:50%;
      left:-20%;
      width:20%;
      height:18px;
      transform:translateY(-50%);
      background:
        linear-gradient(90deg,
          rgba(218,255,62,0) 0%,
          rgba(218,255,62,.06) 20%,
          rgba(218,255,62,.55) 50%,
          rgba(244,255,158,.18) 70%,
          rgba(218,255,62,0) 100%);
      filter:blur(5px);
      opacity:.65;
      animation:scannerSweep 1.85s ease-in-out infinite;
    }

    #loadingMeta{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    #loadingStatus{
      min-width:0;
      flex:1;
      font-family:"Michroma", sans-serif;
      font-weight:400;
      font-size:10px;
      letter-spacing:.18em;
      text-transform:none;
      color:rgba(255,255,255,.62);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      animation:statusFlicker 2.8s ease-in-out infinite;
    }

    #loadingPctWrap{
      position:relative;
      min-width:90px;
      text-align:right;
    }

    #loadingPct{
      position:relative;
      display:inline-block;
      font-family:"Michroma", sans-serif;
      font-weight:400;
      font-size:10px;
      letter-spacing:.14em;
      color:#edf8bf;
      font-variant-numeric:tabular-nums;
      text-shadow:
        0 0 8px rgba(218,255,62,.14),
        0 0 16px rgba(218,255,62,.10);
      animation:pctPulse 2.2s ease-in-out infinite;
    }

    #loadingPct::before,
    #loadingPct::after{
      content:attr(data-text);
      position:absolute;
      inset:0;
      pointer-events:none;
      opacity:0;
    }

    #loadingPct.glitch::before{
      opacity:.55;
      color:rgba(218,255,62,.85);
      transform:translateX(1px);
    }

    #loadingPct.glitch::after{
      opacity:.35;
      color:rgba(255,255,255,.8);
      transform:translateX(-1px);
    }

    #loadingPct.glitch{
      animation:
        pctPulse 2.2s ease-in-out infinite,
        pctGlitchMain .16s steps(2, end) 1;
    }

    #loadingPct.glitch::before{
      animation:pctGlitchBefore .16s steps(2, end) 1;
    }

    #loadingPct.glitch::after{
      animation:pctGlitchAfter .16s steps(2, end) 1;
    }

    @keyframes scannerSweep{
      0%   { left:-22%; opacity:.15; }
      14%  { opacity:.60; }
      50%  { opacity:.95; }
      86%  { opacity:.55; }
      100% { left:102%; opacity:.12; }
    }

    @keyframes loadingLogoBreath{
      0%,100%{
        transform:translateZ(0) scale(1);
        filter:
          drop-shadow(0 0 10px rgba(218,255,62,.16))
          drop-shadow(0 0 22px rgba(218,255,62,.08));
      }
      50%{
        transform:translateZ(0) scale(1.008);
        filter:
          drop-shadow(0 0 14px rgba(218,255,62,.24))
          drop-shadow(0 0 30px rgba(218,255,62,.12));
      }
    }

    @keyframes loadingOverlayPulse{
      0%,100%{ opacity:.55; }
      50%{ opacity:1; }
    }

    @keyframes pctPulse{
      0%,100%{ opacity:.88; }
      50%{ opacity:1; }
    }

    @keyframes statusFlicker{
      0%,100%{ opacity:.78; }
      48%{ opacity:.92; }
      49%{ opacity:.58; }
      50%{ opacity:.92; }
      51%{ opacity:.72; }
      52%{ opacity:.92; }
    }

    @keyframes pctGlitchMain{
      0%   { transform:translate(0,0); }
      25%  { transform:translate(-1px,0); }
      50%  { transform:translate(1px,0); }
      75%  { transform:translate(-.5px,0); }
      100% { transform:translate(0,0); }
    }

    @keyframes pctGlitchBefore{
      0%   { transform:translate(0,0); clip-path:inset(0 0 0 0); }
      30%  { transform:translate(2px,-1px); clip-path:inset(8% 0 45% 0); }
      65%  { transform:translate(-1px,1px); clip-path:inset(55% 0 8% 0); }
      100% { transform:translate(0,0); clip-path:inset(0 0 0 0); }
    }

    @keyframes pctGlitchAfter{
      0%   { transform:translate(0,0); clip-path:inset(0 0 0 0); }
      25%  { transform:translate(-2px,0); clip-path:inset(50% 0 14% 0); }
      60%  { transform:translate(1px,0); clip-path:inset(12% 0 52% 0); }
      100% { transform:translate(0,0); clip-path:inset(0 0 0 0); }
    }

    /* Hide gallery HUD / dock / audio bar until loading is fully finished */
    body.is-loading .hudIcon,
    body.is-loading .hudIconLeft,
    body.is-loading #mobileIconDock,
    body.is-loading #scBar{
      opacity:0 !important;
      visibility:hidden !important;
      pointer-events:none !important;
    }

    body.is-loading #scIframeHost{
      display:none !important;
    }

    #scBar{
      position:fixed; left:0; right:0; bottom:0;
      height:var(--bar-h); background:#1a1a1a;
      border-top:1px solid rgba(255,255,255,.15);
      display:flex; align-items:center; padding:0 14px; gap:20px;
      z-index:50; font-size:13px; color:#eee;
      -webkit-tap-highlight-color: transparent;
      /* FIX 2: promote bar to its own layer so it never triggers canvas repaints */
      will-change: transform;
      transform: translateZ(0);
    }
    #scBar button{
      width:34px; height:34px; border-radius:8px; border:1px solid var(--btn-brd);
      background:var(--btn-bg); color:#fff; cursor:pointer; display:inline-grid; place-items:center; outline:none;
    }
    #scBar button:hover{ background:var(--btn-bg-hover); }
    #scBar button:focus-visible{ box-shadow: 0 0 0 2px rgba(255,255,255,.25); }
    .icon{ width:18px; height:18px; display:block; fill:#fff; pointer-events:none; }
    .sc-left{ display:flex; gap:6px; align-items:center; }
    .sc-center{ flex:1; display:flex; align-items:center; gap:10px; user-select:none; min-width:180px; }
    #scSeek{ flex:1; height:6px; background:#555; border-radius:4px; position:relative; cursor:pointer; }
    #scSeekFill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); border-radius:4px; }
    .time{ min-width:40px; text-align:center; color:#ddd; font-variant-numeric: tabular-nums; }
    .sc-right{ display:flex; align-items:center; gap:12px; min-width:280px; }
    #scThumb{ width:34px; height:34px; border-radius:6px; object-fit:cover; }
    #barVol{ width:84px; }

    /* RIGHT HUD group: reset (far right), fullscreen (left of reset), auto-tour (left of fullscreen) */
    .hudIcon{
      position:fixed; z-index:10000; width:56px; height:56px; cursor:pointer; user-select:none; -webkit-user-drag:none;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45)); opacity:.96; transition: transform .12s ease, opacity .12s ease;
      right:calc(12px + var(--safe-right)); bottom:calc(12px + var(--bar-h) + var(--safe-bottom));
      /* FIX 3: own layer for every HUD icon so hover transitions don't invalidate canvas */
      will-change: transform, opacity;
    }
    .hudIcon:hover{ transform:translateY(-1px); opacity:1; }
    #fullscreenIcon{ right:calc(12px + var(--safe-right) + 56px + 8px); }
    /* auto-tour sits to the LEFT of fullscreen (two slots in) */
    #autoTourIcon{ right:calc(12px + var(--safe-right) + (56px + 8px) * 2); }
    #autoTourIcon.is-active{ filter: drop-shadow(0 0 12px rgba(218,255,62,.55)); opacity:1; }

    .hudHidden{
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* LEFT HUD group: instagram (far left), share (right of instagram), email (right of share) */
    .hudIconLeft{
      position:fixed; z-index:10000; width:56px; height:56px; cursor:pointer; user-select:none; -webkit-user-drag:none;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45)); opacity:.96; transition: transform .12s ease, opacity .12s ease;
      left:calc(12px + var(--safe-left)); bottom:calc(12px + var(--bar-h) + var(--safe-bottom));
      will-change: transform, opacity;
    }
    .hudIconLeft:hover{ transform:translateY(-1px); opacity:1; }
    #shareIcon{ left:calc(12px + var(--safe-left) + 56px + 8px); }
    /* email sits to the RIGHT of share (two slots in) */
    #emailIcon{ left:calc(12px + var(--safe-left) + (56px + 8px) * 2); }

    /* Desktop icon strip: subtle plain black 75%, no blur, sits just
       above the SoundCloud bar behind the HUD icon row. Not tall/intrusive. */
    #mobileIconDock{
      display:block;
      position:fixed; left:0; right:0;
      bottom:0;
      height: calc(var(--icon-size) + var(--dock-pad)*2 + var(--safe-bottom));
      background: rgba(0,0,0,.75);
      z-index: 9990;
      pointer-events:none; /* mobile stays unchanged */
      will-change: transform;
      transform: translateZ(0);
    }
    #mobileIconDock.is-hidden{
      opacity:0 !important;
      visibility:hidden !important;
      pointer-events:none !important;
    }

    @media (pointer:coarse), (max-width: 900px){
      :root{
        --icon-size: 52px;
        --dock-pad: 10px;
      }

      /* Dark strip behind the icon row — plain black 75%, NO blur. */
      #mobileIconDock{
  display:none; /* desktop: hidden */
  position:fixed; left:0; right:0;
  bottom:0;
  height: calc(var(--icon-size) + var(--dock-pad)*2 + var(--safe-bottom));
  background: rgba(0,0,0,.75);
  z-index: 9990;
  pointer-events:none;
  will-change: transform;
  transform: translateZ(0);
}

      /* All mobile icons share one row, centered vertically in the dock,
         sized a touch smaller, equal spacing via percentage anchors. */
      .hudIcon, .hudIconLeft{
        width: var(--icon-size); height: var(--icon-size);
        bottom: calc(var(--dock-pad) + var(--safe-bottom)) !important;
        top: auto;
        transform: translateX(-50%); /* center each icon on its anchor point */
        filter: drop-shadow(0 4px 10px rgba(0,0,0,.55));
      }
      .hudIcon:hover, .hudIconLeft:hover{ transform: translateX(-50%) translateY(-1px); }

      /* fullscreen stays hidden on mobile; 5 visible icons:
         instagram, share, email, auto-tour, reset — evenly spaced. */
      #fullscreenIcon{ display:none !important; }

      #instaIcon   { left: 12% !important; right:auto !important; }
      #shareIcon   { left: 31% !important; right:auto !important; }
      #emailIcon   { left: 50% !important; right:auto !important; }
      #autoTourIcon{ left: 69% !important; right:auto !important; }
      #resetCamIcon{ left: 88% !important; right:auto !important; }

      #scBar, #scIframeHost{ display:none !important; }
      #instaIcon, #shareIcon, #emailIcon{ display:block !important; }
    }

    @media (max-width: 560px){
      #scBar{ gap:12px; padding:0 10px; }
      .sc-right{ min-width:200px; gap:10px; }
      #barVol{ width:70px; }
      .time{ display:none; }
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>

  <script>
  /* ========= Helpers & flags ========= */
  const IS_MOBILE =
  /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
  (
    window.matchMedia?.('(pointer:coarse)').matches === true &&
    Math.min(window.innerWidth, window.innerHeight) <= 900
  );

  console.log("IS_MOBILE =", IS_MOBILE, {
    width: window.innerWidth,
    height: window.innerHeight,
    pointerCoarse: window.matchMedia?.('(pointer:coarse)').matches,
    ua: navigator.userAgent
  });

  const IS_IOS = /iP(ad|hone|od)/.test(navigator.userAgent);
  const SC_ENABLED = !IS_MOBILE;

  const fmtTime = (ms)=> {
    const sec = Math.max(0, Math.floor((ms||0)/1000));
    const m = Math.floor(sec/60), s = sec%60;
    return `${m}:${s.toString().padStart(2,'0')}`;
  };

  const DPR = (()=> {
    const raw = window.devicePixelRatio || 1;
    const steps = [1, 1.25, 1.5, 2, 2.5, 3];
    let pick = steps[0], best = Infinity;
    for (const s of steps){ const d = Math.abs(s - raw); if (d < best){ best = d; pick = s; } }
    return pick;
  })();

  /* ===== LOADING OVERLAY controller =====
     Drives a deterministic, smooth progress bar that reaches 100% only when the
     gallery's first stable render is ready, then fades the overlay out. */
  const Loader = (() => {
    const overlay     = document.getElementById('loadingOverlay');
    const fill        = document.getElementById('loadingBarFill');
    const pctEl       = document.getElementById('loadingPct');
    const statusEl    = document.getElementById('loadingStatus');
    const scanLabelEl = document.getElementById('loadingScanLabel');

    let shown = 0;
    let target = 0;
    let raf = 0;
    let done = false;
    let lastGlitchAt = 0;
    let lastShownValue = -1;
    let finished = false; // guards against double finish()

    const statusSteps = [
      { upTo: 16, label: 'Scanning assets...' },
      { upTo: 34, label: 'Loading textures...' },
      { upTo: 52, label: 'Mapping wall panels...' },
      { upTo: 72, label: 'Rendering space...' },
      { upTo: 90, label: 'Calibrating viewport...' },
      { upTo: 99, label: 'Finalizing system...' },
      { upTo: 100, label: 'Gallery ready...' }
    ];

    function getStatus(v){
      const hit = statusSteps.find(step => v <= step.upTo);
      return hit ? hit.label : 'Initializing...';
    }

    /* ===== Status leetspeak two-step =====
       Each time the canonical phrase changes, the label first appears in a
       broken-but-readable leetspeak version (e.g. "$c4nn1n6 455375..."), then
       quickly resolves letter-by-letter back into the clean phrase. Readable,
       not random gibberish. Lightweight + safe: one self-clearing setInterval
       per phrase, text-only writes; never touches the RAF progress loop or
       Babylon. Spaces and punctuation are always preserved. */
    const LEET_MAP = {
      a:'4', A:'4',
      b:'8', B:'8',
      e:'3', E:'3',
      g:'6', G:'6',
      i:'1', I:'1',
      o:'0', O:'0',
      s:'5', S:'$',
      t:'7', T:'7'
    };

    // Only letters that have a substitution can be "broken"; everything else
    // (other letters, spaces, dots) stays as-is so the phrase reads cleanly.
    function leetChar(ch){
      return Object.prototype.hasOwnProperty.call(LEET_MAP, ch) ? LEET_MAP[ch] : ch;
    }

    let scrambleTimer = 0;
    let lastPhrase = null;

    function stopScramble(){
      if (scrambleTimer){ clearInterval(scrambleTimer); scrambleTimer = 0; }
    }

    /* Build the fully-leeted version once, then reveal real characters
       left-to-right. Total broken phase is kept to ~120-250ms by tuning
       TICK_MS and the per-tick reveal step against the phrase length. */
    function scrambleTo(phrase){
      stopScramble();
      if (!statusEl) return;

      const chars   = phrase.split('');
      const total   = chars.length;
      const leeted  = chars.map(leetChar);

      // Target the broken phase into the requested 120-250ms window.
      const TICK_MS = 30;
      const BROKEN_HOLD_TICKS = 1;            // ~30ms fully-broken hold up front
      const RESOLVE_TICKS = Math.max(3, Math.min(7, Math.ceil(total / 3)));
      const stepPerTick = total / RESOLVE_TICKS;  // chars locked per resolve tick

      // Show the fully-broken readable version immediately (step 1).
      statusEl.textContent = leeted.join('');

      let ticks = 0;
      let resolved = 0;

      scrambleTimer = setInterval(() => {
        ticks++;

        // Hold the broken version briefly before resolving.
        if (ticks <= BROKEN_HOLD_TICKS){
          return;
        }

        resolved = Math.min(total, resolved + stepPerTick);
        const cut = Math.floor(resolved);

        let out = '';
        for (let i = 0; i < total; i++){
          out += (i < cut) ? chars[i] : leeted[i];
        }
        statusEl.textContent = out;

        if (cut >= total){
          statusEl.textContent = phrase; // ensure clean final phrase
          stopScramble();
        }
      }, TICK_MS);
    }

    function setStatusPhrase(phrase){
      if (!statusEl) return;
      if (phrase === lastPhrase) return; // only re-run on an actual change
      lastPhrase = phrase;
      scrambleTo(phrase);
    }

    function pulseGlitch(now, v){
      if (!pctEl) return;

      const valueChanged = v !== lastShownValue;
      if (!valueChanged) return;

      const minDelay = 380 + Math.random() * 520;
      if (now - lastGlitchAt < minDelay) {
        lastShownValue = v;
        return;
      }

      lastShownValue = v;
      lastGlitchAt = now;

      pctEl.classList.remove('glitch');
      void pctEl.offsetWidth;
      pctEl.classList.add('glitch');

      setTimeout(() => {
        pctEl.classList.remove('glitch');
      }, 170);
    }

    function render(){
      shown += (target - shown) * 0.18;
      if (Math.abs(target - shown) < 0.3) shown = target;

      const v = Math.max(0, Math.min(100, Math.round(shown)));
      const txt = v + '%';

      if (fill) {
        fill.style.width = txt;
      }

      if (pctEl) {
        pctEl.textContent = txt;
        pctEl.dataset.text = txt;
        pulseGlitch(performance.now(), v);
      }

      if (statusEl) {
        // Drive the scramble from the canonical phrase; only changes trigger it.
        setStatusPhrase(getStatus(v));
      }

      if (scanLabelEl) {
        scanLabelEl.textContent = v >= 100 ? 'SYSTEM READY' : 'LOADING';
      }

      // Keep the progress RAF alive until we are both done AND visually at 100%.
      if (!done || v < 100) {
        raf = requestAnimationFrame(render);
      } else {
        raf = 0; // render loop has stopped; nothing pending
      }
    }

    raf = requestAnimationFrame(render);

    function reveal(){
      // Remove the loading state and reveal all HUD elements safely.
      document.body.classList.remove('is-loading');

      document.querySelectorAll('.hudIcon, .hudIconLeft').forEach(el => {
        el.classList.remove('hudHidden');
      });

      try { overlay?.remove(); } catch (_) {}

      // Cancel the progress RAF only if one is still pending.
      if (raf) { cancelAnimationFrame(raf); raf = 0; }
    }

    return {
      set(p){
        target = Math.max(target, Math.min(100, p));
      },
      finish(){
        if (finished) return;       // never run twice
        finished = true;
        target = 100;

        const check = () => {
          if (shown >= 99.5){
            done = true;

            // Stop any in-flight scramble and write the final phrases directly.
            stopScramble();
            lastPhrase = 'Gallery ready...';
            if (statusEl) statusEl.textContent = 'Gallery ready...';
            if (scanLabelEl) scanLabelEl.textContent = 'SYSTEM READY';

            overlay?.classList.add('is-hidden');

            // After the CSS fade, reveal the gallery UI and drop the overlay.
            setTimeout(reveal, 650);
          } else {
            requestAnimationFrame(check);
          }
        };

        check();
      }
    };
  })();

  const canvas = document.getElementById("renderCanvas");

  const engine = new BABYLON.Engine(canvas, true, {
    preserveDrawingBuffer: false,
    stencil: true,
    antialias: true,
    adaptToDeviceRatio: false,
    powerPreference: "high-performance",
    disableWebGL2Support: false
  });

  const sceneCaps = engine.getCaps ? engine.getCaps() : {};
  const MAX_TEX_CAP = Math.max(512, sceneCaps.maxTextureSize || 2048);
  const MOBILE_TEX_CAP  = Math.min(MAX_TEX_CAP, 768);
  const DESKTOP_TEX_CAP = Math.min(MAX_TEX_CAP, 4096);
  const TEX_BASE = IS_MOBILE ? 1048 : 768;
  const nearestPOT = (n, cap)=> Math.min(Math.pow(2, Math.round(Math.log2(Math.max(2, n)))), cap || n);
  let TEX_SIZE = Math.round(TEX_BASE * Math.min(DPR, 2));
  TEX_SIZE = nearestPOT(Math.min(TEX_SIZE, IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP), IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP);
  const MAX_ANISO = sceneCaps.maxAnisotropy || 4;

  /* ===== Wall text content ===== */
  const TW_STRINGS = {
    front: [
      "WELCOME_TO_THE_VIRTUAL_SHOWROOM",
      "EXPLORE_THE_COLLECTIONS",
      "FOLLOW_US_ON_INSTAGRAM"
    ],
    back: [
      "THANK_YOU_FOR_VISITING",
      "NEW_DROPS_THIS_MONTH",
      "LIMITED_EDITION_OUT_NOW"
    ],
    left: [
      "Future ready. Powered by the beat."
    ],
    right: [
      "Future ready. Powered by the beat."
    ]
  };

  /* Fixed side-wall sentence (Poppins SemiBold, static, both platforms). */
  const SIDE_WALL_TEXT = "Future ready. Powered by the beat.";

  const TW_WIDTH_FRAC = {
    front: 0.82,
    back:  0.82,
    left:  0.82,
    right: 0.82
  };

  const TW_SPEED_MS     = 75;
  const TW_PAUSE_MS     = 1900;
  const TW_COLOR_HEX    = "#daff3e";
  const TW_FONT_PX      = 175;
  const TW_MARGIN_WALL  = 0.18;
  const TW_FLIP_VERTICAL = true;
  const TW_OFFSET_PX = -190;
  const TW_CURSOR_BLINK_MS   = 450;
  const TW_CURSOR_ALPHA_MIN  = 0.25;
  const TW_CURSOR_ALPHA_MAX  = 1.00;
  const TW_CURSOR_COLOR      = TW_COLOR_HEX;

  let __twFrontPlane = null, __twBackPlane = null;
  let __twFrontDT = null, __twBackDT = null;
  let __twFrontRAF = 0, __twBackRAF = 0;
  let twFrontAnchor = null;
  let twBackAnchor  = null;

  let __twLeftPlane = null, __twRightPlane = null;
  let __twLeftRAF = 0, __twRightRAF = 0;
  const __cyclers = { front:null, back:null, left:null, right:null };

  function projectToScreen(worldPos){
    const eng   = scene.getEngine();
    const vp    = camera.viewport.toGlobal(eng.getRenderWidth(), eng.getRenderHeight());
    const p = BABYLON.Vector3.Project(
      worldPos,
      BABYLON.Matrix.Identity(),
      scene.getTransformMatrix(),
      vp
    );
    const rect = eng.getRenderingCanvasClientRect
      ? eng.getRenderingCanvasClientRect()
      : (eng.getRenderingCanvas() || canvas).getBoundingClientRect();
    const sx = rect.width  / eng.getRenderWidth();
    const sy = rect.height / eng.getRenderHeight();
    const cssX = rect.left + p.x * sx;
    const cssY = rect.top  + p.y * sy;
    const visible = p.z >= 0 && p.z <= 1
                 && p.x >= 0 && p.x <= eng.getRenderWidth()
                 && p.y >= 0 && p.y <= eng.getRenderHeight();
    return { x: p.x, y: p.y, cssX, cssY, visible };
  }

  function prepareTypewriterSlots(el){
    if (!el) return null;
    if (el.dataset.twInit) return el.querySelector('.tw-text');
    const textSpan   = document.createElement('span');
    const cursorSpan = document.createElement('span');
    textSpan.className   = 'tw-text';
    cursorSpan.className = 'cursor';
    el.innerHTML = '';
    el.appendChild(textSpan);
    el.appendChild(cursorSpan);
    el.dataset.twInit = '1';
    return textSpan;
  }

  function makeTypewriterPlane({ name, x = 0, y, z, rotY, width, height, color=TW_COLOR_HEX }){
    const plane = BABYLON.MeshBuilder.CreatePlane(name, { width, height, sideOrientation: BABYLON.Mesh.FRONTSIDE }, scene);
    plane.position.set(x, y, z);
    plane.rotation.y = rotY;
    plane.isPickable = false;

    const nextPOT = (n) => Math.pow(2, Math.ceil(Math.log2(Math.max(1, n))));
    const TW_TEX_CAP = IS_MOBILE ? 2048 : 4096;
    const texW = Math.min(TW_TEX_CAP, Math.max(1024, nextPOT(Math.round(1024 * (width / 4)))));
    const texH = Math.max(256, nextPOT(Math.round(TW_FONT_PX * 2)));

    const dt = new BABYLON.DynamicTexture(name + "_dt", { width: texW, height: texH }, scene, true, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    dt.hasAlpha = true;
    dt.gammaSpace = true;
    dt.wrapU = dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.anisotropicFilteringLevel = scene.getEngine().getCaps().maxAnisotropy || 4;

    const mat = new BABYLON.StandardMaterial(name + "_mat", scene);
    mat.disableLighting = true;
    mat.backFaceCulling = false;
    mat.diffuseTexture = dt;
    mat.opacityTexture = dt;
    mat.emissiveTexture = dt;
    mat.emissiveColor = BABYLON.Color3.FromHexString(TW_COLOR_HEX);

    plane.material = mat;

    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);
    dt.update(false);

    return { plane, dt, texW, texH };
  }

  const TW_SAFE_FRAC = 0.88;
  function fitFontPx(ctx, fullText, texW, baseFontPx){
    const maxW = texW * TW_SAFE_FRAC;
    let size = baseFontPx;
    ctx.font = `600 ${size}px Doto, monospace`;
    let w = ctx.measureText(fullText).width;
    if (w <= maxW) return size;
    size = Math.max(8, Math.floor(size * (maxW / w)));
    for (let i = 0; i < 24; i++){
      ctx.font = `600 ${size}px Doto, monospace`;
      if (ctx.measureText(fullText).width <= maxW) break;
      size -= Math.max(1, Math.round(size * 0.04));
      if (size <= 8){ size = 8; break; }
    }
    return size;
  }

  function drawTypeLine(dt, {
    text,
    progress,
    texW,
    texH,
    color = TW_COLOR_HEX,
    fontPx = TW_FONT_PX,
    hFlip = false,
    hCompress = 1
  }){
    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);

    ctx.imageSmoothingEnabled  = true;
    ctx.imageSmoothingQuality  = "high";
    const fitPx = fitFontPx(ctx, text, texW, fontPx);
    ctx.fillStyle              = color;
    ctx.textAlign              = "center";
    ctx.textBaseline           = "middle";
    ctx.font                   = `600 ${fitPx}px Doto, monospace`;

    const x = Math.round(texW / 2);
    const y = Math.round(texH / 2) + (TW_OFFSET_PX | 0);
    const content = text.slice(0, progress);

    ctx.save();
    if (TW_FLIP_VERTICAL){
      ctx.translate(0, texH);
      ctx.scale(1, -1);
    }
    if (hFlip){
      ctx.translate(texW, 0);
      ctx.scale(-1, 1);
    }
    if (hCompress !== 1){
      ctx.translate(x, 0);
      ctx.scale(hCompress, 1);
      ctx.translate(-x, 0);
    }

    ctx.shadowColor = "rgba(218,255,62,0.20)";
    ctx.shadowBlur  = Math.max(2, Math.round(fitPx * 0.22));

    ctx.fillText(content, x, y);

    if (progress > 0){
      const metrics   = ctx.measureText(content);
      const textWidth = metrics?.width || 0;
      const endX      = x + textWidth / 2;

      const now     = performance.now();
      const period  = Math.max(120, TW_CURSOR_BLINK_MS || 900);
      const tRel    = (now % period) / period;
      const tri     = tRel < 0.5 ? (tRel * 2) : (1 - (tRel - 0.5) * 2);
      const alpha   = (TW_CURSOR_ALPHA_MIN ?? 0.25) + tri * ((TW_CURSOR_ALPHA_MAX ?? 1.0) - (TW_CURSOR_ALPHA_MIN ?? 0.25));

      const prevShadow = ctx.shadowColor;
      const prevAlpha  = ctx.globalAlpha;
      const prevFill   = ctx.fillStyle;
      const prevAlign  = ctx.textAlign;

      ctx.shadowColor  = "rgba(0,0,0,0)";
      ctx.globalAlpha  = Math.max(0, Math.min(1, alpha));
      ctx.fillStyle    = TW_CURSOR_COLOR || color;
      ctx.textAlign    = "left";
      ctx.fillText("_", Math.round(endX + 2), y);

      ctx.textAlign   = prevAlign;
      ctx.fillStyle   = prevFill;
      ctx.globalAlpha = prevAlpha;
      ctx.shadowColor = prevShadow;
    }

    ctx.restore();
    dt.update(false);
  }

  function runTypewriterToDT(dt, opts = {}){
    const {
      texts: _texts,
      text: _text,
      speedMs = TW_SPEED_MS,
      pauseMs = TW_PAUSE_MS,
      texW,
      texH,
      color = TW_COLOR_HEX,
      fontPx = TW_FONT_PX,
      hFlip = false,
      hCompress = 1
    } = opts;

    const texts = Array.isArray(_texts) && _texts.length ? _texts : [(_text || "")];
    if (!texts.length) return 0;

    let idx = 0;
    let start = performance.now();
    let rafId = 0;

    let lastChars = -1;
    let lastCursorBucket = -1;

    function tick(now){
      const t = texts[idx];
      const lenMs = t.length * speedMs;
      const elapsed = now - start;

      let chars;
      if (elapsed <= lenMs) {
        chars = Math.floor(elapsed / speedMs);
      } else {
        chars = t.length;
        if (elapsed >= lenMs + pauseMs) {
          idx = (idx + 1) % texts.length;
          start = now;
          lastChars = -1;
          lastCursorBucket = -1;
        }
      }

      const period = Math.max(120, TW_CURSOR_BLINK_MS);
      const cursorBucket = Math.floor(((now % period) / period) * 20);

      if (chars !== lastChars || cursorBucket !== lastCursorBucket) {
        drawTypeLine(dt, { text: t, progress: chars, texW, texH, color, fontPx, hFlip, hCompress });
        lastChars = chars;
        lastCursorBucket = cursorBucket;
      }

      rafId = requestAnimationFrame(tick);
    }

    return (rafId = requestAnimationFrame(tick));
  }

  /* ===== MOBILE full-sentence cycler ===== */
  function drawFullSentence(dt, { text, texW, texH, alpha=1, color=TW_COLOR_HEX, fontPx=TW_FONT_PX, hFlip=false, fixedPx=null, hCompress=1 }){
    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const fitPx = (fixedPx != null) ? fixedPx : fitFontPx(ctx, text, texW, fontPx);
    ctx.font = `600 ${fitPx}px Doto, monospace`;

    const x = Math.round(texW / 2);
    const y = Math.round(texH / 2) + (TW_OFFSET_PX | 0);

    ctx.save();
    if (TW_FLIP_VERTICAL){ ctx.translate(0, texH); ctx.scale(1, -1); }
    if (hFlip){ ctx.translate(texW, 0); ctx.scale(-1, 1); }
    if (hCompress !== 1){
      ctx.translate(x, 0);
      ctx.scale(hCompress, 1);
      ctx.translate(-x, 0);
    }
    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    ctx.shadowColor = "rgba(218,255,62,0.20)";
    ctx.shadowBlur  = Math.max(2, Math.round(fitPx * 0.22));
    ctx.fillStyle   = color;
    ctx.fillText(text, x, y);
    ctx.restore();
    dt.update(false);
  }

  function fixedFontPxForSet(ctx, texts, texW, baseFontPx, hCompress=1){
    let smallest = baseFontPx;
    for (const t of (texts || [])){
      const effTexW = texW / Math.max(0.01, hCompress);
      const px = fitFontPx(ctx, t, effTexW, baseFontPx);
      if (px < smallest) smallest = px;
    }
    return smallest;
  }

  function runSentenceCyclerToDT(dt, opts = {}){
    const {
      texts: _texts, text: _text,
      texW, texH, color = TW_COLOR_HEX, fontPx = TW_FONT_PX,
      holdMs = 2600,
      fadeMs = 320,
      hFlip = false,
      fixedPx = null,
      hCompress = 1
    } = opts;

    const texts = Array.isArray(_texts) && _texts.length ? _texts : [(_text || "")];
    if (!texts.length) return { stop(){} };

    let idx = 0;
    let intervalId = 0;
    let rafId = 0;
    let stopped = false;

    function fade(from, to, text, done){
      const t0 = performance.now();
      function step(now){
        if (stopped) return;
        const r = Math.min(1, (now - t0) / fadeMs);
        const a = from + (to - from) * r;
        drawFullSentence(dt, { text, texW, texH, alpha:a, color, fontPx, hFlip, fixedPx, hCompress });
        if (r < 1) rafId = requestAnimationFrame(step);
        else if (done) done();
      }
      rafId = requestAnimationFrame(step);
    }

    function showCurrent(){
      const text = texts[idx];
      fade(0, 1, text);
    }

    function next(){
      if (stopped) return;
      const cur = texts[idx];
      fade(1, 0, cur, () => {
        idx = (idx + 1) % texts.length;
        fade(0, 1, texts[idx]);
      });
    }

    showCurrent();
    if (texts.length > 1){
      intervalId = setInterval(next, holdMs + fadeMs);
    }

    return {
      stop(){
        stopped = true;
        if (intervalId) clearInterval(intervalId);
        if (rafId) cancelAnimationFrame(rafId);
      }
    };
  }

  function drawStaticSideText(dt, { text, texW, texH, color=TW_COLOR_HEX, fontPx=TW_FONT_PX, hFlip=false }){
    const ctx = dt.getContext();
    ctx.clearRect(0, 0, texW, texH);
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    const SIDE_HSCALE = IS_MOBILE ? 0.72 : 1.15;
    const SIDE_VSCALE = IS_MOBILE ? 1.0 : 0.6;

    const maxW = (texW * 0.90) / SIDE_HSCALE;

    let size = fontPx;
    const sideFont = `"Michroma", sans-serif`;

    ctx.font = `400 ${size}px ${sideFont}`;
    let w = ctx.measureText(text).width;

    if (w > maxW){
      size = Math.max(8, Math.floor(size * (maxW / w)));
      for (let i = 0; i < 24; i++){
        ctx.font = `400 ${size}px ${sideFont}`;
        if (ctx.measureText(text).width <= maxW) break;
        size -= Math.max(1, Math.round(size * 0.04));
        if (size <= 8){ size = 8; break; }
      }
    }

    ctx.font = `400 ${size}px ${sideFont}`;

    const x = Math.round(texW / 2);
    const y = Math.round(texH / 2);

    ctx.save();

    if (TW_FLIP_VERTICAL){
      ctx.translate(0, texH);
      ctx.scale(1, -1);
    }

    if (hFlip){
      ctx.translate(texW, 0);
      ctx.scale(-1, 1);
    }

    ctx.translate(x, y);
    ctx.scale(SIDE_HSCALE, SIDE_VSCALE);
    ctx.translate(-x, -y);

    ctx.shadowColor = "rgba(95,95,95,0.18)";
    ctx.shadowBlur  = Math.max(1, Math.round(size * 0.10));
    ctx.fillStyle   = color;
    ctx.fillText(text, x, y);

    ctx.restore();
    dt.update(false);
  }

  /* ========= Scene setup ========= */

  function applyHardwareScale(levelOverride){
    const lvl = typeof levelOverride === "number" ? levelOverride : currentScaleLevel;
    engine.setHardwareScalingLevel(Math.round(lvl * 100) / 100);

  const AutoScale = {
    enabled: IS_MOBILE, windowMs: 1200, warmupMs: 1500, lowFpsMs: 30, highFpsMs: 17,
    step: 0.05, minLevel: 0.33, maxLevel: 1.00, accMs: 0, frames: 0, lastEval: performance.now()
  };

  function unlit(hex) {
    const m = new BABYLON.StandardMaterial("m", scene);
    m.diffuseColor = BABYLON.Color3.FromHexString(hex);
    m.disableLighting = true;
    m.backFaceCulling = false;
    m.specularColor = new BABYLON.Color3(0, 0, 0);
    return m;
  }

  function unlitTex(tex, { doubleSided = false, gain = 1.0 } = {}) {
    const m = new BABYLON.StandardMaterial("mt", scene);
    m.disableLighting = true;

    m.diffuseTexture = tex;
    m.emissiveTexture = tex;
    m.emissiveColor = new BABYLON.Color3(1, 1, 1);

    m.backFaceCulling = !doubleSided;
    m.specularColor = new BABYLON.Color3(0, 0, 0);

    if (tex) {
      tex.gammaSpace = true;
      tex.level = gain;
      tex.wrapU = BABYLON.Texture.CLAMP_ADDRESSMODE;
      tex.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
      tex.updateSamplingMode(BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
      tex.anisotropicFilteringLevel = MAX_ANISO;
    }

    return m;
  }

  function makeDT(name, w, h, genMipmaps = true) {
    const dt = new BABYLON.DynamicTexture(
      name,
      { width: w, height: h },
      scene,
      genMipmaps,
      BABYLON.Texture.TRILINEAR_SAMPLINGMODE
    );
    dt.wrapU = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.hasAlpha = false;
    dt.anisotropicFilteringLevel = MAX_ANISO;
    return dt;
  }

  function buildCeilingWithAperture({ inw = 0.1 } = {}) {
    const y1 = ROOM.H - 0.04;

    const W = ROOM.W, D = ROOM.D;

    const part = (name,w,h,px,pz)=>{
      const p = BABYLON.MeshBuilder.CreatePlane(name,{width:w,height:h,sideOrientation:BABYLON.Mesh.FRONTSIDE},scene);
      p.position.set(px,yCeil,pz); p.rotation.x=Math.PI/2; p.material=mCeil; p.isPickable=false;
    };
    part("ceil_north", W, (D - openD)/2, 0, -(openD/2 + (D-openD)/4));
    part("ceil_south", W, (D - openD)/2, 0,  (openD/2 + (D-openD)/4));
    part("ceil_west",  (W - openW)/2, openD, -(openW/2 + (W-openW)/4), 0);
    part("ceil_east",  (W - openW)/2, openD,  +(openW/2 + (W-openW)/4), 0);

    const lipH = 0.02, mLip = unlit("#181818");
    const mkLip=(name,w,h,px,pz,ry=0)=>{

      p.position.set(px,y1 - lipH/2,pz); p.rotation.y=ry; p.material=mLip; p.isPickable=false;

    mkLip("lip_north", openW, lipH, 0, -openD/2, 0);

  function buildLED() {
    const n = new BABYLON.TransformNode("led", scene);
    const t = 0.02, inw = 0.1;
    const xL = -ROOM.W/2 + inw, xR = ROOM.W/2 - inw, zF = ROOM.D/2 - inw, zB = -ROOM.D/2 + inw;
    const y0 = 0.04, y1 = ROOM.H - 0.04;
    const mat = new BABYLON.StandardMaterial("ledMat", scene);
    mat.emissiveColor = BABYLON.Color3.FromHexString("#ffbdf6");

    const seg = (a, b) => {
      const d = BABYLON.Vector3.Distance(a, b);
      const m = BABYLON.MeshBuilder.CreateBox("ledSeg", { width: t, height: t, depth: d }, scene);
      m.position = BABYLON.Vector3.Center(a, b); m.lookAt(b); m.rotation.x += Math.PI;
      m.material = mat; m.isPickable = false; m.parent = n; glow.addIncludedOnlyMesh(m);
    };
    [[xL,y0,zF,xR,y0,zF],[xR,y0,zF,xR,y0,zB],[xR,y0,zB,xL,y0,zB],[xL,y0,zB,xL,y0,zF],
     [xL,y1,zF,xR,y1,zF],[xR,y1,zF,xR,y1,zB],[xR,y1,zB,xL,y1,zB],[xL,y1,zB,xL,y1,zF]]
     .forEach(([ax,ay,az,bx,by,bz]) => seg(new BABYLON.Vector3(ax,ay,az), new BABYLON.Vector3(bx,by,bz)));
    [[xL,zF],[xR,zF],[xR,zB],[xL,zB]].forEach(([x,z]) => seg(new BABYLON.Vector3(x,y0,z), new BABYLON.Vector3(x,y1,z)));
  }

  function drawChecker(ctx, w, h) {
    const tile = 32;
    for (let y=0; y<h; y+=tile) for (let x=0; x<w; x+=tile){
      const even = ((x/tile)+(y/tile)) % 2 === 0;
      ctx.fillStyle = even ? "#dcdcdc" : "#f4f4f4";
      ctx.fillRect(x, y, tile, tile);
    }
  }

  function fitDrawToCanvas(ctx, bmp, targetW, targetH, frameW, frameH, mode="cover", bg="#000") {
    const frameAspect = frameW / frameH;
    const imgAspect   = bmp.width / bmp.height;
    const nearlySame = Math.abs(imgAspect - frameAspect) < 0.02;
    let dw, dh, dx = 0, dy = 0;
    if (mode === "contain" && nearlySame) {
      dw = targetW; dh = targetH; dx = 0; dy = 0;
    } else if (mode === "cover"){
      if (imgAspect > frameAspect){
        dh = targetH; dw = Math.round(dh * imgAspect); dx = Math.round((targetW - dw) / 2);
      } else {
        dw = targetW; dh = Math.round(dw / imgAspect); dy = Math.round((targetH - dh) / 2);
      }
    } else {
      if (imgAspect > frameAspect){
        dw = targetW; dh = Math.round(dw / imgAspect); dy = Math.round((targetH - dh) / 2);
      } else {
        dh = targetH; dw = Math.round(dh * imgAspect); dx = Math.round((targetW - dw) / 2);
      }
    }
    if (bg){ ctx.fillStyle = bg; ctx.fillRect(0, 0, targetW, targetH); }
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(bmp, 0, 0, bmp.width, bmp.height, dx, dy, dw, dh);
  }

  const isWebP = (u) => /\.webp$/i.test(u || "");

  function getFrameTexSize() {
    const A = FRAME_SIZE.W / FRAME_SIZE.H;
    const cap = IS_MOBILE ? MOBILE_TEX_CAP : DESKTOP_TEX_CAP;
    let texW = Math.min(TEX_SIZE, cap);
    texW = nearestPOT(texW, cap);
    let texH = Math.round(texW / A);
    texH = nearestPOT(Math.max(2, texH), cap);
    if (texH > cap) {
      texH = nearestPOT(cap, cap);
      texW = nearestPOT(Math.max(2, Math.round(texH * A)), cap);
    }
    return { texW, texH };
  }

  function setWebPToFrame(url, targetItem, texSize=TEX_SIZE, fitMode="cover") {
    if (!isWebP(url)) {
      console.warn("Only WebP is allowed for frame images. Skipping:", url);
      return;
    }
    const safeUrl = encodeURI(url);
    const img = new Image();
    if (!/^(\.|\/)/.test(safeUrl)) img.crossOrigin = "anonymous";
    img.decoding = "async";

    img.onload = () => {
      const { texW, texH } = getFrameTexSize();
      const dt = makeDT("imgDT_" + Math.random(), texW, texH, !IS_MOBILE);
      dt.gammaSpace = true;
      const ctx = dt.getContext();
      fitDrawToCanvas(ctx, img, texW, texH, FRAME_SIZE.W, FRAME_SIZE.H, fitMode, "#000");
      dt.update(false);

      const newMat = unlitTex(dt);
      newMat.zOffset = -1;
      dt.vScale  = -1;
      dt.vOffset = 1;

      scene.onBeforeRenderObservable.addOnce(() => {
        const oldMat = targetItem.frame.material;
        targetItem.frame.material = newMat;
        scene.onBeforeRenderObservable.addOnce(() => {
          if (oldMat && oldMat.name !== "ph_img_mat") {
            oldMat.diffuseTexture?.dispose();
            oldMat.emissiveTexture?.dispose();
            oldMat.dispose();
          }
        });
      });

      Assets.markFrameImageLoaded();
    };

    img.onerror = (e) => { console.error("[WebP] load error:", safeUrl, e); Assets.markFrameImageLoaded(); };
    img.src = safeUrl;
  }

  function setVideoToFrame(url, targetItem, { loop=true, muted=true, autoplay=true } = {}) {
    const vt = new BABYLON.VideoTexture(
      "vidTex_" + Math.random(), url, scene, true, false,
      BABYLON.Texture.TRILINEAR_SAMPLINGMODE,
      { autoPlay: autoplay, loop: loop, muted: muted }
    );
    try {
      vt.video.muted = !!muted;
      vt.video.loop = !!loop;
      vt.video.playsInline = true;
    } catch (e) {}
    vt.wrapU = vt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    vt.updateSamplingMode(BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    vt.anisotropicFilteringLevel = MAX_ANISO;

    const mat = unlitTex(vt);
    mat.zOffset = -1;
    mat.diffuseColor = new BABYLON.Color3(0,0,0);
    targetItem.frame.material = mat;
    targetItem.videoTex = vt;

    const applyAspect = () => {
      const v = vt.video;
      if (!v || !v.videoWidth || !v.videoHeight) return;
      const r = v.videoWidth / v.videoHeight;
      const A = FRAME_SIZE.W / FRAME_SIZE.H;
      let uScale = 1, vScale = 1, uOffset = 0, vOffset = 0;
      if (r > A) { vScale = A / r; vOffset = (1 - vScale) / 2; }
      else if (r < A) { uScale = r / A; uOffset = (1 - uScale) / 2; }
      vt.uScale = uScale; vt.vScale = vScale;
      vt.uOffset = uOffset; vt.vOffset = vOffset;
    };
    if (vt.video) {
      vt.video.addEventListener('loadedmetadata', applyAspect, { once:true });
      applyAspect();
    }
  }

  /* ===== Frame sizing ===== */
  const FRAME_SIZE = { W: 2, H: 2 };
  let FRAME_BOX_BORDER = 0.08;
  let FRAME_COLOR = "#717171";
  let FRAME_BASE_H = 2.2;
  let FRAME_DELTA_H = 0;

  function makeGradDT(name, w, h, {from="#7a7a7a", to="#555", vertical=true}={}){
    const dt = new BABYLON.DynamicTexture(name, {width:w, height:h}, scene, true, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
    const ctx = dt.getContext();
    ctx.clearRect(0,0,w,h);
    const g = vertical ? ctx.createLinearGradient(0,0,0,h) : ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0, from); g.addColorStop(1, to);
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);
    dt.update(false);
    dt.wrapU = dt.wrapV = BABYLON.Texture.CLAMP_ADDRESSMODE;
    dt.anisotropicFilteringLevel = MAX_ANISO;
    return dt;
  }

  const lighten = (c,f)=> new BABYLON.Color3(Math.min(1, c.r+(1-c.r)*f), Math.min(1, c.g+(1-c.g)*f), Math.min(1, c.b+(1-c.b)*f));
  const darken  = (c,f)=> new BABYLON.Color3(c.r*(1-f), c.g*(1-f), c.b*(1-f));

  function makeShadedFrameBoxMultiMat(baseHex = FRAME_COLOR){
    const c = BABYLON.Color3.FromHexString(baseHex);
    const mats = [
      makeGradDT("frm_front",256,256,{from:lighten(c,0.12).toHexString(), to:darken(c,0.18).toHexString()}),
      makeGradDT("frm_back",256,256,{from:darken(c,0.10).toHexString(), to:darken(c,0.10).toHexString()}),
      makeGradDT("frm_right",256,256,{from:lighten(c,0.08).toHexString(), to:darken(c,0.12).toHexString()}),
      makeGradDT("frm_left",256,256,{from:lighten(c,0.08).toHexString(), to:darken(c,0.12).toHexString()}),

  /* ===== Placard ===== */
  function drawPlacard(plac, data, rotY, planeW, planeH){
    const aspect = Math.max(0.05, planeW / planeH);
    const baseH = IS_MOBILE ? 256 : 512;
    let texH = nearestPOT(baseH, IS_MOBILE ? 1024 : 2048);
    let texW = nearestPOT(Math.max(2, Math.round(texH * aspect)), IS_MOBILE ? 2048 : 4096);

    const dt = makeDT("pl", texW, texH, !IS_MOBILE);
    const c = dt.getContext();
    c.fillStyle = "#6b6b6b";
    c.fillRect(0, 0, texW, texH);

    const padX = Math.round(texW * 0.05);
    const padY = Math.round(texH * 0.16);
    const maxW = texW - padX * 2;
    const maxBlockH = texH - padY * 2;

    c.fillStyle = "#ffffff";
    c.textAlign = "center";
    c.textBaseline = "middle";

    const text = (data.title || "(untitled)").trim();
    const maxLines = 2;
    const labelFont = `"Poppins", sans-serif`;

    function wrapAt(fontPx){
      c.font = `400 ${fontPx}px Poppins, sans-serif`;

      const words = text.split(/\s+/);
      const lines = [];
      let buf = "";

      for (const w of words){
        const test = buf ? (buf + " " + w) : w;
        if (c.measureText(test).width <= maxW) {
          buf = test;
        } else {
          if (buf) lines.push(buf);
          buf = w;
        }
      }

      if (buf) lines.push(buf);
      return lines;
    }

    let fontPx = Math.round(texH * 0.46);
    let lines = wrapAt(fontPx);

    let guard = 40;
    while (guard-- > 0){
      lines = wrapAt(fontPx);
      const tooMany = lines.length > maxLines;
      const lineH = fontPx * 1.18;
      const blockH = Math.min(lines.length, maxLines) * lineH;
      const tooTall = blockH > maxBlockH;
      const tooWide = lines.some(ln => c.measureText(ln).width > maxW);

      if (!tooMany && !tooTall && !tooWide) break;

      fontPx -= Math.max(2, Math.round(fontPx * 0.06));
      if (fontPx < 16){
        fontPx = 16;
        break;
      }
    }

    fontPx = Math.max(12, Math.round(fontPx * 0.96) - 2);

    c.font = `500 ${fontPx}px ${labelFont}`;
    lines = wrapAt(fontPx);

    if (lines.length > maxLines){
      const keep = lines.slice(0, maxLines);
      let last = keep[maxLines - 1];
      while (c.measureText(last + "…").width > maxW && last.length > 0){
        last = last.slice(0, -1);
      }
      keep[maxLines - 1] = last + "…";
      lines = keep;
    }

    const lineH = fontPx * 1.18;
    const blockH = lines.length * lineH;
    const startY = Math.round(texH / 2 - blockH / 2 + lineH / 2);

    const VSCALE = 0.8;
    const cy = texH / 2;

    c.save();
    c.translate(0, cy);
    c.scale(1, VSCALE);
    c.translate(0, -cy);

    lines.forEach((ln, i) => c.fillText(ln, texW / 2, startY + i * lineH));
    c.restore();

    dt.update(false);
    const mat = unlitTex(dt);
    mat.zOffset = -2;

    dt.vScale = -1;
    dt.vOffset = 1;

    plac.material = mat;
  }

  function normalOffset(rotY, dist){
    const nx = Math.sin(rotY) * dist;
    const nz = Math.cos(rotY) * dist;
    return new BABYLON.Vector3(nx, 0, nz);
  }

  /* ===== addFrame ===== */
  function addFrame(pos, rotY=0, wall='front'){
    const box = BABYLON.MeshBuilder.CreateBox("frameBox", {
      width: FRAME_SIZE.W + FRAME_BOX_BORDER,
      height: FRAME_SIZE.H + FRAME_BOX_BORDER,
      depth: 0.06
    }, scene);
    box.position = pos.add(normalOffset(rotY, 0.0));
    box.rotation.y = rotY;
    box.isPickable = true;
    box.subMeshes = [];
    const indices = box.getIndices();
    const verticesCount = box.getTotalVertices();
    let idx = 0;
    const perFace = indices.length / 6;
    for (let f = 0; f < 6; f++){
      new BABYLON.SubMesh(f, 0, verticesCount, idx, perFace, box);
      idx += perFace;
    }
    box.material = makeShadedFrameBoxMultiMat(FRAME_COLOR);

    const f = BABYLON.MeshBuilder.CreatePlane("frame", {
      width: FRAME_SIZE.W,
      height: FRAME_SIZE.H,
      sideOrientation: BABYLON.Mesh.FRONTSIDE
    }, scene);
    f.position = pos.add(normalOffset(rotY, 0.04));
    f.rotation.y = rotY + Math.PI;
    f.isPickable = true;

    const { texW: phW, texH: phH } = getFrameTexSize();
    const dt = makeDT("ph_img", phW, phH, true);
    const ctx = dt.getContext();
    drawChecker(ctx, phW, phH);
    dt.update(false);

    const fMat = unlitTex(dt);
    fMat.zOffset = -1;
    fMat.name = "ph_img_mat";
    f.material = fMat;

    const placW = FRAME_SIZE.W;
    const placH = Math.max(0.22, FRAME_SIZE.W * 0.128);
    const plac = BABYLON.MeshBuilder.CreatePlane("plac", {
      width: placW,
      height: placH,
      sideOrientation: BABYLON.Mesh.FRONTSIDE
    }, scene);

    const PLAC_GAP = 0.28;
    const placCenterY = pos.y - (FRAME_SIZE.H / 2) - PLAC_GAP - (placH / 2);
    plac.position = new BABYLON.Vector3(pos.x, placCenterY, pos.z).add(normalOffset(rotY, 0.03));
    plac.rotation.y = rotY + Math.PI;
    plac.isPickable = true;
    plac._width = placW;
    plac._height = placH;

    const data = { title: "(untitled)", url: "", src: "" };
    drawPlacard(plac, data, rotY, placW, placH);

    return { frame: f, box, placard: plac, data, wall, rotY, pos };
  }

  function startWallText(wallKey, dt, texW, texH){
    const texts = TW_STRINGS[wallKey];
    const hFlip = (wallKey === 'left' || wallKey === 'right');
    const isSide = (wallKey === 'left' || wallKey === 'right');

    if (isSide){
      drawStaticSideText(dt, {
        text: SIDE_WALL_TEXT,
        texW,
        texH,
        color: TW_COLOR_HEX,
        fontPx: TW_FONT_PX,
        hFlip
      });
      return { rafId: 0, controller: null };
    }

    if (IS_MOBILE){
      try { __cyclers[wallKey]?.stop?.(); } catch(_){}

      const H_COMPRESS = 0.8;
      const measCtx = dt.getContext();
      const combinedFB = [].concat(TW_STRINGS.front || [], TW_STRINGS.back || []);
      const fixedPx = fixedFontPxForSet(measCtx, combinedFB, texW, TW_FONT_PX, H_COMPRESS);

      const ctrl = runSentenceCyclerToDT(dt, {
        texts,
        texW,
        texH,
        color: TW_COLOR_HEX,
        fontPx: TW_FONT_PX,
        holdMs: 2600,
        fadeMs: 320,
        hFlip: false,
        fixedPx,
        hCompress: H_COMPRESS
      });

      __cyclers[wallKey] = ctrl;
      return { rafId: 0, controller: ctrl };
    }

    const rafId = runTypewriterToDT(dt, {
      texts,
      speedMs: TW_SPEED_MS,
      pauseMs: TW_PAUSE_MS,
      texW,
      texH,
      color: TW_COLOR_HEX,
      fontPx: TW_FONT_PX,
      hFlip: false,
      hCompress: 1.2
    });

    return { rafId, controller: null };
  }

      __logoBack = BABYLON.MeshBuilder.CreatePlane("logo_back", { width: logoW, height: logoH }, scene);
      __logoBack.position.set(0, yPos, zBack);
      __logoBack.rotation.y = Math.PI;
      __logoBack.material   = matBack;

      const nextPOTLocal = (n) => Math.pow(2, Math.ceil(Math.log2(Math.max(1, n))));
      const panelHeightForCalc = Math.max(0.20, TW_FONT_PX / 100);
      const panelTexH = Math.max(256, nextPOTLocal(Math.round(TW_FONT_PX * 2)));
      const textFracFromBottom = (Math.round(panelTexH / 2) + (TW_OFFSET_PX | 0)) / panelTexH;
      const textCenterOffsetInPlane = panelHeightForCalc * (0.5 - textFracFromBottom);
      const logoVisibleH = logoH * (h / SIZE);

      try { __twFrontPlane?.dispose?.(); __twFrontPlane = null; } catch(_){}
